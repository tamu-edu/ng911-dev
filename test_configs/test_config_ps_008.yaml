test_config:
  conformance:
    tests:
      - name: "PS_008"
        variations:
          - name: "Policy_with_large_ruleset"
            description: "Verify if JWS objects are unaltered after fetching from Policy Store for policy \
                          with large ruleset"
            interfaces:
              - name: "IF_ESRP_PS"
                port_names: []
            params:
              messages:
                - action: "send"
                  if_name: "IF_ESRP_PS"
                  if_port_name: ""  # Optional
                  prep_steps:
                    - method_name: "modify_json_file"
                      kwargs:
                        json_input_file: "file.test_suite/test_files/JSON/policy_object/Policy_object_with_large_ruleset_v010.3f.3.0.1.json"
                        param_name: "policyOwner"
                        value: "TEST_SYSTEM_POLICY_OWNER"
                        output_file: "file./tmp/PS_008/PS_008.json"
                    - method_name: "modify_json_file"
                      kwargs:
                        json_input_file: "file./tmp/PS_008/PS_008.json"
                        param_name: "policyId"
                        value: "PS_008_Policy_with_large_ruleset"
                        output_file: "file./tmp/PS_008/PS_008.json"
                    - method_name: "generate_jws"
                      kwargs:
                        json_source: "file./tmp/PS_008/PS_008.json"
                        cert_path: "var.lab_config['entities'][0]['certificate_file']"
                        key_path: "var.lab_config['entities'][0]['certificate_key']"
                        output_file: "file./tmp/jws_body"
                    - method_name: "send_http_request"
                      kwargs:
                        method: "POST"
                        url: "/Policies"
                        cert_path: "var.lab_config['entities'][0]['certificate_file']"
                        key_path: "var.lab_config['entities'][0]['certificate_key']"
                        content_type: "application/json"
                        body: "file./tmp/jws_body"
                      save_result_as: "file./tmp/http_send"
                  type: "HTTP"
                  method: "GET"
                  response_code: "200"
                  http_url: "/Policies?policyOwner=TEST_SYSTEM_POLICY_OWNER&policyId=PS_008_Policy_with_large_ruleset"  # part after f.e. http://IP:PORT
                  body: ""
                  sipp_scenario: {}
                  run_in_background: "False"
            filtering_options: # optional
              - message_type: "stimulus" # stimulus/output/other
                src_interface: "IF_ESRP_PS"
                dst_interface: "IF_PS_ESRP"
                sip_method: "" #  leave empty if not needed
                http_request_method: "GET" #  leave empty if not needed
                response_status_code: "200" #  leave empty if not needed
                header_contains: "/Policies"
                body_contains: ""
