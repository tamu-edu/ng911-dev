test_config:
  conformance:
    tests:
      - name: "CHFE_004"
        variations:
          - name: "SIP_INVITE_for_callbacks"
            description: "Validate SIP INVITE sent by CHFE for callbacks"
            interfaces:
              - name: "IF_BCF_CHFE"
                port_names: []
              - name: "IF_BCF-RECEIVER_CHFE"
                port_names: []
            params:
              messages:
                - action: "manual"
                  id: "show_user_prompt"
                  if_name: ""
                  type: "SIP"
                  method: ""
                  instead: ""
                  prompt: "Please answer and end incoming call on CHFE, then trigger callback.\
                          Press any key to continue when ready..."
                  next_action: "receive_initial_invite"
                - action: "receive"
                  id: "receive_initial_invite"
                  if_name: "IF_BCF-RECEIVER_CHFE"
                  if_port_name: ""  # Optional
                  prep_steps:
                    - method_name: "extract_from_config"
                      kwargs:
                        config_part: "lab_config['lab_config']['entities']"
                        where_field: "name"
                        where_value: "CHFE"
                        extract_field: "api"
                      "save_result_as": "var.chfeapi"
                    - method_name: "extract_from_config"
                      kwargs:
                        config_part: "var.chfeapi"
                        extract_field: "sender_tel_number"
                      "save_result_as": "var.sender_tel_number"
                    - "method_name": "replace_string_in_file"
                      "kwargs":
                        "input_file": "file.test_suite/test_files/SIPp_scenarios/SIP_INVITE/SIP_INVITE_SDP_with_g711alaw_audio_receive_callback.xml"
                        "param_name": "+12025551212"
                        "value": "var.sender_tel_number"
                        "output_file": "file./tmp/CHFE_004/SIP_INVITE_SDP_with_g711alaw_audio_receive_callback.xml"
                  type: "SIP"
                  method: "INVITE"
                  response_code: ""
                  http_url: ""  # part after f.e. http://IP:PORT
                  body: ""
                  sipp_scenario: {
                    scenario_file_path: "file./tmp/CHFE_004/SIP_INVITE_SDP_with_g711alaw_audio_receive_callback.xml",
                    kwargs: {},
                    save_response_as: "CHFE_004_var1_SEND_response.log",
                    save_log_as: "CHFE_004_var1_SEND.log"
                  }
                  run_in_background: "False"
                  next_action: "show_confirm_prompt"
                - action: "manual"
                  id: "show_confirm_prompt"
                  if_name: ""
                  type: "SIP"
                  method: ""
                  instead: ""
                  prompt: "Confirm that callback was triggered."
                  next_action: ""
            filtering_options: # optional
              - message_type: "stimulus" # stimulus/output/other
                src_interface: "IF_CHFE_BCF-RECEIVER"
                dst_interface: "IF_BCF-RECEIVER_CHFE"
                sip_method: "INVITE" #  leave empty if not needed
                http_request_method: "" #  leave empty if not needed
                response_status_code: "" #  leave empty if not needed
                header_contains: ""
                body_contains: ""
          - name: "SIP_INVITE_for_outbound_calls"
            description: "Validate SIP INVITE sent by CHFE for outbound calls"
            interfaces:
              - name: "IF_BCF-RECEIVER_CHFE"
                port_names: []
            params:
              messages:
                - action: "receive"
                  id: "receive_outbound_invite"
                  if_name: "IF_BCF-RECEIVER_CHFE"
                  if_port_name: ""  # Optional
                  prep_steps: []
                  type: "SIP"
                  method: "INVITE"
                  response_code: ""
                  http_url: ""  # part after f.e. http://IP:PORT
                  body: ""
                  sipp_scenario: {
                    scenario_file_path: "file.test_suite/test_files/SIPp_scenarios/SIP_RECEIVE/SIP_INVITE_RECEIVE.xml",
                    kwargs: {},
                    save_response_as: "CHFE_004_var2_RECEIVE_response.log",
                    save_log_as: "CHFE_004_var2_RECEIVE.log"
                  }
                  run_in_background: "True"
                  next_action: "show_user_prompt"
                - action: "manual"
                  id: "show_user_prompt"
                  if_name: ""
                  type: "SIP"
                  method: ""
                  instead: ""
                  prompt: "MANUAL ACTION REQUIRED - please trigger outbound call to Test System on CHFE \
                          and press any key to continue..."
                  next_action: "receive_outbound_invite"
            filtering_options: # optional
              - message_type: "stimulus" # stimulus/output/other
                src_interface: "IF_CHFE_BCF-RECEIVER"
                dst_interface: "IF_BCF-RECEIVER_CHFE"
                sip_method: "INVITE" #  leave empty if not needed
                http_request_method: "" #  leave empty if not needed
                response_status_code: "" #  leave empty if not needed
                header_contains: ""
                body_contains: ""
        requirements:
          - name: "RQ_CHFE_003"
            variations: ["all"]
          - name: "RQ_CHFE_004"
            variations: ["SIP_INVITE_for_outbound_calls"]
          - name: "RQ_CHFE_005"
            variations: ["all"]