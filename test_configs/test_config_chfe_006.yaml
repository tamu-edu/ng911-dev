                    save_log_as: "ESRP_CHFE_006_var1.log"
                  }
                  run_in_background: "True"

                  # Test System CHFE
                - action: "receive"
                  if_name: "IF_TS-CHFE_ESRP"
                  if_port_name: ""  # Optional
                  prep_steps:
