              - name: "IF_BCF_ESRP"
                port_names: []
              - name: "IF_ESRP_BCF"
                port_names: []
              - name: "IF_ESRP_CHFE"
                port_names: []
              - name: "IF_CHFE_ESRP"
                port_names: []
              - name: "IF_ESRP_TS-CHFE"
                port_names: []
              - name: "IF_TS-CHFE_ESRP"
                port_names: []
            params:
              messages:
                  # Test System BCF
                - action: "receive"
                  if_name: "IF_BCF_OSP"
                  if_port_name: ""  # Optional
                  prep_steps:
                    - method_name: "get_interface_address"
                      kwargs:
                        interface_name: "IF_OSP_BCF"
                      "save_result_as": "var.IF_OSP_BCF"
                    - method_name: "get_interface_address"
                      kwargs:
                        interface_name: "IF_BCF_OSP"
                      "save_result_as": "var.IF_BCF_OSP"
                    - method_name: "get_interface_address"
                      kwargs:
                        interface_name: "IF_BCF_ESRP"
                      "save_result_as": "var.IF_BCF_ESRP"
                    - method_name: "get_interface_address"
                      kwargs:
                        interface_name: "IF_ESRP_BCF"
                      "save_result_as": "var.IF_ESRP_BCF"
                  type: "SIP"
                  method: "INVITE"
                  response_code: ""
                  http_url: ""  # part after f.e. http://IP:PORT
                  body: ""
                  sipp_scenario: {
                    scenario_file_path: "file.test_suite/test_files/SIPp_scenarios/sip_service/CHFE_006/BCF_CHFE_006_var1.xml",
                    kwargs: {
                      set: {
                        IF_OSP_BCF: "var.IF_OSP_BCF",
                        IF_BCF_OSP: "var.IF_BCF_OSP",
                        IF_BCF_ESRP: "var.IF_BCF_ESRP",
                        IF_ESRP_BCF: "var.IF_ESRP_BCF",
                      }
                    },
                    save_response_as: "BCF_CHFE_006_var1_response.log",
                    save_log_as: "BCF_CHFE_006_var1.log"
                  }
                  run_in_background: "True"

                  # Test System ESRP
                - action: "receive"
                  if_name: "IF_ESRP_BCF"
                  if_port_name: ""  # Optional
                  prep_steps:
                    - method_name: "get_interface_address"
                      kwargs:
                        interface_name: "IF_OSP_BCF"
                      "save_result_as": "var.IF_OSP_BCF"
                    - method_name: "get_interface_address"
                      kwargs:
                        interface_name: "IF_BCF_ESRP"
                      "save_result_as": "var.IF_BCF_ESRP"
                    - method_name: "get_interface_address"
                      kwargs:
                        interface_name: "IF_CHFE_ESRP"
                      "save_result_as": "var.IF_CHFE_ESRP"
                    - method_name: "get_interface_address"
                      kwargs:
                        interface_name: "IF_ESRP_CHFE"
                      "save_result_as": "var.IF_ESRP_CHFE"
                    - method_name: "get_interface_address"
                      kwargs:
                        interface_name: "IF_TS-CHFE_ESRP"
                      "save_result_as": "var.IF_TS-CHFE_ESRP"
                    - method_name: "extract_from_config"
                      kwargs:
                        config_part: "lab_config['lab_config']['entities']"
                        where_field: "name"
                        where_value: "ESRP"
                        extract_field: "api"
                      "save_result_as": "var.api"
                    - method_name: "extract_from_config"
                      kwargs:
                        config_part: "var.api"
                        extract_field: "conference_id"
                      "save_result_as": "var.conference_id"
                    - method_name: "extract_from_config"
                      kwargs:
                        config_part: "lab_config['lab_config']['entities']"
                        where_field: "name"
                        where_value: "CHFE"
                        extract_field: "api"
                      "save_result_as": "var.api"
                    - method_name: "extract_from_config"
                      kwargs:
                        config_part: "var.api"
                        extract_field: "tel_number"
                      "save_result_as": "var.CHFE_tel"
                    - method_name: "extract_from_config"
