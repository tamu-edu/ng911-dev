                        interface_name: "IF_ESRP_TS-CHFE"
                      "save_result_as": "var.IF_ESRP_TS-CHFE"
                    - method_name: "extract_from_config"
                      kwargs:
                        config_part: "lab_config['lab_config']['entities']"
                        where_field: "name"
                        where_value: "ESRP"
                        extract_field: "api"
                      "save_result_as": "var.api"
                    - method_name: "extract_from_config"
                      kwargs:
                        config_part: "var.api"
                        extract_field: "conference_id"
                      "save_result_as": "var.conference_id"
                    - method_name: "extract_from_config"
                      kwargs:
                        config_part: "lab_config['lab_config']['entities']"
                        where_field: "name"
                        where_value: "TS-CHFE"
                        extract_field: "api"
                      "save_result_as": "var.api"
                    - method_name: "extract_from_config"
                      kwargs:
                        config_part: "var.api"
                        extract_field: "tel_number"
                      "save_result_as": "var.TS-CHFE_tel"
                  type: "SIP"
                  method: "INVITE"
                  response_code: ""
                  http_url: ""  # part after f.e. http://IP:PORT
                  body: ""
                  sipp_scenario: {
                    scenario_file_path: "file.test_suite/test_files/SIPp_scenarios/sip_service/CHFE_006/TS-CHFE_CHFE_006_var1.xml",
                    kwargs: {
                      set: {
                        IF_ESRP_TS-CHFE: "var.IF_ESRP_TS-CHFE",
                        conference_id: "var.conference_id",
                        TS-CHFE_tel: "var.TS-CHFE_tel"
                      }
                    },
                    save_response_as: "TS-CHFE_CHFE_006_var1_response.log",
                    save_log_as: "TS-CHFE_CHFE_006_var1.log"
                  }
                  run_in_background: "True"

                  # CHFE
                - action: "manual"
                  id: "show_user_prompt"
                  if_name: ""
                  type: "SIP"
                  method: ""
                  instead: ""
                  prompt: "Please do following action on CHFE:\
                          1. Answer incoming call on CHFE.\
                          2. Make call transfer to any number.
                          3. After 2 minutes end the call.\
                          \
                          Press any key to continue when ready..."
                  next_action: "start_call_on_osp"

                  # Test System OSP
                - action: "send"
                  id: "start_call_on_osp"
                  if_name: "IF_OSP_BCF"
                  if_port_name: ""  # Optional
                  prep_steps:
                    - method_name: "get_interface_address"
                      kwargs:
                        interface_name: "IF_BCF_OSP"
                      "save_result_as": "var.IF_BCF_OSP"
                    - method_name: "get_interface_address"
                      kwargs:
                        interface_name: "IF_TS-CHFE_ESRP"
                      "save_result_as": "var.IF_TS-CHFE_ESRP"
                  type: "SIP"
                  method: "INVITE"
                  response_code: "200"
                  http_url: ""  # part after f.e. http://IP:PORT
                  body: ""
                  sipp_scenario: {
                    scenario_file_path: "file.test_suite/test_files/SIPp_scenarios/sip_service/CHFE_006/OSP_CHFE_006_var1.xml",
                    kwargs: {
                      set: {
                        IF_BCF_OSP: "var.IF_BCF_OSP",
                        IF_TS-CHFE_ESRP: "var.IF_TS-CHFE_ESRP"
                      }
                    },
                    save_response_as: "OSP_CHFE_006_var1_response.log",
                    save_log_as: "OSP_CHFE_006_var1.log"
                  }
                  run_in_background: "False"

            filtering_options: # optional
              - message_type: "stimulus" # stimulus/output/other
                src_interface: "IF_OSP_BCF"
                dst_interface: "IF_BCF_OSP"
                sip_method: "INVITE" #  leave empty if not needed
