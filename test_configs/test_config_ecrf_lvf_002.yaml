test_config:
  conformance:
    tests:
      - name: "ECRF_LVF_002"
        variations:
          - name: "Point_as_a_location_in_findService_request"
            description: "Validate HTTP 200 OK response on findService request with point geolocation"
            interfaces:
              - name: "IF_ESRP_ECRF-LVF"
                port_names: []
            params:
              messages:
                - action: "send"
                  if_name: "IF_ESRP_ECRF-LVF"
                  if_port_name: ""  # Optional
                  prep_steps:
                    - method_name: "extract_from_config"
                      kwargs:
                        config_part: "lab_config['lab_config']['entities']"
                        where_field: "name"
                        where_value: "ECRF-LVF"
                        extract_field: "api"
                      "save_result_as": "var.ecrf_lvf_api"
                    - method_name: "extract_from_config"
                      kwargs:
                        config_part: "var.ecrf_lvf_api"
                        extract_field: "http_url_suffix_lost"
                      "save_result_as": "var.http_url"
                  type: "HTTP"
                  method: "POST"
                  response_code: "200"
                  http_url: "var.http_url"   # part after f.e. http://IP:PORT
                  body: "file.test_suite/test_files/HTTP_messages/HTTP_LoST/findService_geodetic_point.xml"
                  sipp_scenario: {}
                  run_in_background: "False"
            filtering_options: # optional
                - message_type: "stimulus" # stimulus/output/other
                  src_interface: "IF_ESRP_ECRF-LVF"
                  dst_interface: "IF_ECRF-LVF_ESRP"
                  sip_method: "" #  leave empty if not needed
                  http_request_method: "POST" #  leave empty if not needed
