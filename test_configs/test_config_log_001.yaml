test_config:
  conformance:
    tests:
      - name: "LOG_001"
        variations:
          - name: "HTTP_GET_to_Versions_entrypoint"
            description: "Validate JSON body of 200 OK response for HTTP GET to /Versions"
            interfaces:
              - name: "IF_ESRP_LOG-read"
                port_names: []
            params:
              messages:
                - action: "send"
                  if_name: "IF_ESRP_LOG-read"
                  if_port_name: ""  # Optional
                  prep_steps: []
                  type: "HTTP"
                  method: "GET"
                  response_code: "200"
                  http_url: "/Versions"  # part after f.e. http://IP:PORT
                  body: ""
                  sipp_scenario: {}
                  run_in_background: "False"
            filtering_options: # optional
              - message_type: "stimulus" # stimulus/output/other
                src_interface: "IF_ESRP_LOG-read"
                dst_interface: "IF_LOG-read_ESRP"
                sip_method: "" #  leave empty if not needed
                http_request_method: "GET" #  leave empty if not needed
                response_status_code: "200" #  leave empty if not needed
                header_contains: "/Versions"
                body_contains: ""
        requirements:
          - name: "RQ_LOG_002"
            variations: ["all"]
          - name: "RQ_LOG_003"
            variations: ["all"]