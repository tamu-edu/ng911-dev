test_config:
  conformance:
    tests:
      - name: "ESRP_014"
        variations:
          - name: "SIP_INVITE_location_PIDF-LO_Boundary1"
            description: "Test ESRP logging for LostQueryLogEvent."
            interfaces:
              - name: "IF_BCF_ESRP"
                port_names: []
              - name: "IF_ECRF-LVF_ESRP"
                port_names: []
              - name: "IF_ESRP_LOG"
                port_names: [ ]
              - name: "IF_LOG_ESRP"
                port_names: [ ]
            params:
              messages:
                - action: "receive"
                  if_name: "IF_ECRF-LVF_ESRP"
                  if_port_name: ""  # Optional
                  prep_steps: []
                  type: "HTTP"
                  method: "POST"
                  response_code: "200"
                  http_url: ""  # part after f.e. http://IP:PORT
                  body: "file.test_suite/test_files/HTTP_messages/HTTP_LoST/findServiceResponse.xml"
                  sipp_scenario: {}
                  run_in_background: "True"
                - action: "receive"
                  if_name: "IF_LOG_ESRP"
                  if_port_name: ""  # Optional
                  prep_steps:
                    - method_name: "extract_from_config"
                      kwargs:
                        config_part: "lab_config['lab_config']['entities']"
                        where_field: "name"
                        where_value: "LOG"
                        extract_field: "interfaces"
                      save_result_as: "var.log_interfaces"
                    - method_name: "extract_from_config"
                      kwargs:
                        config_part: "var.log_interfaces"
                        where_field: "name"
                        where_value: "IF_LOG_ESRP"
                        extract_field: "fqdn"
                      save_result_as: "var.log_fqdn"
                    - method_name: "generate_identifier"
                      kwargs:
                        identifier_type: "logid"
                        fqdn: "var.log_fqdn"
                        set_default: "True"
                      save_result_as: "var.logid"
                    - method_name: "save_to_file"
                      kwargs:
                        input_str: '{"logEventId": "test"}'
                        filename: "/tmp/ESRP_014/logeventid.json"
                    - method_name: "modify_json_file"
                      kwargs:
                        json_input_file: "file./tmp/ESRP_014/logeventid.json"
                        param_name: "logEventId"
                        value: "var.logid"
                        output_file: "file./tmp/ESRP_014/logeventid.json"
                  type: "HTTP"
                  method: [ "POST", "GET" ]
                  response_code: [ "201", "200" ]
                  http_url: [ "/LogEvents", "/Versions" ]
                  body: [ "file./tmp/ESRP_014/logeventid.json", "file.test_suite/test_files/JSON/versions/Logging_Service_Versions_object_example_v010.3f.5.0.0.json" ]
                  run_in_background: "True"
                - action: "send"
                  if_name: "IF_BCF_ESRP"
                  if_port_name: ""  # Optional
                  prep_steps:
                    - method_name: "get_interface_address"
                      kwargs:
                        interface_name: "IF_BCF_ESRP"
                      "save_result_as": "var.IF_BCF_ESRP"
                    - method_name: "generate_identifier"
                      kwargs: {
                        identifier_type: "callid",
                        fqdn: "var.IF_BCF_ESRP",
                        set_default: "True"
                      }
                      save_result_as: "var.callid"
                    - method_name: "generate_identifier"
                      kwargs: {
                        identifier_type: "incidentid",
                        fqdn: "var.IF_BCF_ESRP",
                        set_default: "True"
                      }
                      save_result_as: "var.incidentid"
                    - "method_name": "replace_string_in_file"
                      "kwargs":
                        "input_file": "file.test_suite/test_files/SIPp_scenarios/SIP_INVITE/SIP_INVITE_location_PIDF-LO_Boundary1.xml"
                        "param_name": "urn:emergency:uid:callid:123ABCdefg123ABCdefg123ABCdefg12:test.com"
                        "value": "var.callid"
                        "output_file": "file./tmp/ESRP_014/SIP_INVITE_location_PIDF-LO_Boundary1.xml"
                    - "method_name": "replace_string_in_file"
                      "kwargs":
                        "input_file": "file./tmp/ESRP_014/SIP_INVITE_location_PIDF-LO_Boundary1.xml"
                        "param_name": "urn:emergency:uid:incidentid:123ABCdefg123ABCdefg123ABCdefg12:test.com"
                        "value": "var.incidentid"
                        "output_file": "file./tmp/ESRP_014/SIP_INVITE_location_PIDF-LO_Boundary1.xml"
                  type: "SIP"
                  method: "INVITE"
                  response_code: ""
                  http_url: ""  # part after f.e. http://IP:PORT
                  body: ""
                  sipp_scenario: {
                    scenario_file_path: "file./tmp/ESRP_014/SIP_INVITE_location_PIDF-LO_Boundary1.xml",
                    kwargs: {},
                    save_response_as: "ESRP_014_SEND_response.log",
                    save_log_as: "ESRP_014_SEND.log"
                  }
                  run_in_background: "False"
                  next_action: "manual_timeout"
                - action: "manual"
                  id: "manual_timeout"
                  if_name: ""
                  instead: ""
                  type: "SIP"
                  method: ""
                  timeout: 2  # timeout in seconds
                  prompt: "Waiting 2 seconds for IUT..."
                  next_action: ""
            filtering_options: # optional
                - message_type: "stimulus" # stimulus/output/other
                  src_interface: "IF_BCF_ESRP"
                  dst_interface: "IF_ESRP_BCF"
                  sip_method: "INVITE" #  leave empty if not needed
                  http_request_method: "" #  leave empty if not needed
                  response_status_code: "" #  leave empty if not needed
                  header_contains: ""
                  body_contains: ""
                - message_type: "other" # stimulus/output/other
                  src_interface: "IF_ESRP_ECRF-LVF"
                  dst_interface: "IF_ECRF-LVF_ESRP"
                  sip_method: "" #  leave empty if not needed
                  http_request_method: "POST" #  leave empty if not needed
                  response_status_code: "200" #  leave empty if not needed
                  header_contains: ""
                  body_contains: ""
                - message_type: "output"
                  src_interface: "IF_ESRP_LOG"
                  dst_interface: "IF_LOG_ESRP"
                  sip_method: ""
                  http_request_method: "POST" #  leave empty if not needed
                  response_status_code: "201" #  leave empty if not needed
                  header_contains: "/LogEvents"
                  body_contains: ""
        requirements:
          - name: "RQ_ESRP_173"
            variations: ["SIP_INVITE_location_PIDF-LO_Boundary1"]
