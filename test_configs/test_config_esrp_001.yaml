test_config:
  conformance:
    tests:
      - name: "ESRP_001"
        variations:
          - name: "QueueState update after changing ServiceState"
            description: "Verify QueueState update after changing ServiceState"
            interfaces:
              - name: "IF_BCF_ESRP"
                port_names: []
              - name: "IF_CHFE_ESRP"
                port_names: []
            params:
              messages:
                - action: "receive"
                  if_name: "IF_CHFE_ESRP"
                  if_port_name: ""  # Optional
                  prep_steps: []
                  type: "SIP"
                  method: "INVITE"
                  response_code: ""
                  http_url: ""  # part after f.e. http://IP:PORT
                  body: ""
                  sipp_scenario: {
                    scenario_file_path:
                      "file.test_suite/test_files/SIPp_scenarios/SIP_RECEIVE/SIP_INVITE_RECEIVE_CHFE.xml",
                    kwargs: {},
                    save_response_as: "ESRP_001_RECEIVE_CHFE_response.log",
                    save_log_as: "ESRP_001_RECEIVE_CHFE.log"
                  }
                  run_in_background: "True"
                - action: "send"
                  if_name: "IF_BCF_ESRP"
                  if_port_name: ""  # Optional
                  id: "send_subscribe_servicestate"
                  next_action: "send_subscribe_queuestate"
                  prep_steps:
                    - "method_name": "replace_string_in_file"
                      "kwargs":
                        "input_file": "file.test_suite/test_files/SIPp_scenarios/SIP_SUBSCRIBE/SIP_SUBSCRIBE_ServiceState.xml"
                        "param_name": "[service]"
                        "value": "ESRP"
                        "output_file": "file./tmp/ESRP_001/SIP_SUBSCRIBE_ServiceState.xml"
                  type: "SIP"
                  method: "SUBSCRIBE"
                  response_code: ""
                  http_url: ""  # part after f.e. http://IP:PORT
                  body: ""
                  sipp_scenario: {
                    scenario_file_path: "file./tmp/ESRP_001/SIP_SUBSCRIBE_ServiceState.xml",
                    kwargs: {},
                    save_response_as: "ESRP_001_ServiceState_response.log",
                    save_log_as: "ESRP_001_ServiceState.log"
                  }
                  run_in_background: "True"
                - action: "send"
                  if_name: "IF_BCF_ESRP"
                  if_port_name: ""  # Optional
                  id: "send_subscribe_queuestate"
                  prep_steps:
                    - "method_name": "replace_string_in_file"
                      "kwargs":
                        "input_file": "file.test_suite/test_files/SIPp_scenarios/SIP_SUBSCRIBE/SIP_SUBSCRIBE_QueueState.xml"
                        "param_name": "[service]"
                        "value": "# Queue URI to be manually filled in run_config"
                        "output_file": "file./tmp/ESRP_001/SIP_SUBSCRIBE_QueueState.xml"
                  type: "SIP"
                  method: "SUBSCRIBE"
                  response_code: ""
                  http_url: ""  # part after f.e. http://IP:PORT
                  body: ""
                  sipp_scenario: {
                    scenario_file_path: "file./tmp/ESRP_001/SIP_SUBSCRIBE_QueueState.xml",
                    kwargs: {},
                    save_response_as: "ESRP_001_QueueState_response.log",
                    save_log_as: "ESRP_001_QueueState.log"
                  }
                  run_in_background: "True"
                - action: "manual"
                  if_name: ""
                  instead: ""
                  type: "SIP"
                  method: ""
                  prompt: "MANUAL ACTION REQUIRED - please simulate change of ServiceState to 'Down' 
                                    and press any key to continue..."
                  next_action: "send_subscribe_servicestate"
            filtering_options: # optional
                - message_type: "other" # stimulus/output/other
                  src_interface: "IF_BCF_ESRP"
                  dst_interface: "IF_ESRP_BCF"
                  sip_method: "SUBSCRIBE" #  leave empty if not needed
                  http_request_method: "" #  leave empty if not needed
                  response_status_code: "" #  leave empty if not needed
                  header_contains: "Event: emergency-ServiceState"
                  body_contains: ""
                - message_type: "other" # stimulus/output/other
                  src_interface: "IF_BCF_ESRP"
                  dst_interface: "IF_ESRP_BCF"
                  sip_method: "SUBSCRIBE" #  leave empty if not needed
                  http_request_method: "" #  leave empty if not needed
                  response_status_code: "" #  leave empty if not needed
                  header_contains: "Event: emergency-QueueState"
                  body_contains: ""
                - message_type: "other" # stimulus/output/other
                  src_interface: "IF_BCF_ESRP"
                  dst_interface: "IF_ESRP_BCF"
                  sip_method: "SUBSCRIBE" #  leave empty if not needed
                  http_request_method: "" #  leave empty if not needed
                  response_status_code: "" #  leave empty if not needed
                  header_contains: "Event: emergency-ServiceState"
                  body_contains: ""
                - message_type: "stimulus" # stimulus/output/other
                  src_interface: "IF_BCF_ESRP"
                  dst_interface: "IF_ESRP_BCF"
                  sip_method: "SUBSCRIBE" #  leave empty if not needed
                  http_request_method: "" #  leave empty if not needed
                  response_status_code: "" #  leave empty if not needed
                  header_contains: "Event: emergency-QueueState"
                  body_contains: ""
        requirements:
          - name: "RQ_ESRP_005"
            variations: ["all"]
          - name: "RQ_ESRP_007"
            variations: ["all"]
          - name: "RQ_ESRP_008"
            variations: ["all"]
