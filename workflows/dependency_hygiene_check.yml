name: Dependency Hygiene Check

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

jobs:
  hygiene:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r test_suite/requirements.txt
          pip install deptry

      - name: Run dependency hygiene (deptry)
        run: |
          deptry test_suite --json > deptry-report.json || true

      - name: Upload hygiene report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-hygiene-report
          path: deptry-report.json

      - name: Comment PR with dependency hygiene summary
        if: ${{ github.event_name == 'pull_request' && always() }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const marker = "<!-- DEPTRY_HYGIENE_COMMENT -->";

            let issues = [];

            try {
              if (fs.existsSync("deptry-report.json")) {
                const raw = fs.readFileSync("deptry-report.json", "utf8") || "[]";
                issues = JSON.parse(raw);
                if (!Array.isArray(issues)) issues = [];
              }
            } catch (e) {
              issues = [];
            }

            // -----------------------------
            // Delete previous comment
            // -----------------------------
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            for (const comment of comments) {
              if (comment.body && comment.body.includes(marker)) {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: comment.id
                });
              }
            }

            // 👉 If no issues — do nothing
            if (issues.length === 0) {
              console.log("No issues found — skipping comment");
              return;
            }

            // -----------------------------
            // Build new comment
            // -----------------------------
            let body = "## ❌ Dependency Hygiene Issues Detected\n\n";
            body += `Total issues detected: **${issues.length}**\n\n`;

            // Optional: breakdown by error code
            const types = {};
            for (const issue of issues) {
              const code = issue.error?.code || "UNKNOWN";
              types[code] = (types[code] || 0) + 1;
            }

            if (Object.keys(types).length > 0) {
              body += "**Breakdown:**\n";
              for (const [k, v] of Object.entries(types)) {
                body += `- ${k}: ${v}\n`;
              }
              body += "\n";
            }

            body += "Deptry detected issues such as:\n";
            body += "- unused dependencies\n";
            body += "- missing dependencies\n";
            body += "- transitive dependencies used directly\n\n";

            body += `📎 Full report available in workflow artifacts:\n${runUrl}\n\n`;
            body += marker;

            // -----------------------------
            // Create new comment
            // -----------------------------
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body
            });


      - name: Fail if hygiene issues found
        run: |
          if [ -s deptry-report.json ]; then
            if [ "$(jq length deptry-report.json)" -ne 0 ]; then
              echo "Dependency hygiene issues detected:"
              cat deptry-report.json
              exit 1
            fi
          fi