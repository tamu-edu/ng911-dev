launch_config:
  output_folder: "/tmp/lab_tests/"        # Base folder where run artifacts will be saved
  global_config:
    lab_info: "templates/ALL_TESTS/lab_info.yaml"
    type: "conformance"
    log:
      level: "DEBUG"
      output_file: "PS_DEBUG.log"
    report_files:
      prefix: "PS"
      suffix: "PS_ALL_TESTS" # optional
      output_folder_path: "" # empty if you want to have reports in TS root dir or absolute path to the FOLDER
      detailed_view: true
      types:
        - "docx"
        - "pdf"
    id_summary:
      eng_name: "ENTER NAME"
      supplier:
        name: "ENTER SUPPLIER NAME"
        addr_line_1: "ENTER ADDRESS"
        addr_line_2: ""
        city: "ENTER CITY"
        state: "ENTER STATE"
        country: "ENTER COUNTRY"
        zip: "ENTER ZIP CODE"
        url: "ENTER URL"
      test_env:
        ts_version: "4.0.2"
        ixit_id: "11111"
        test_period_start: "ENTER CURRENT DATE" # ?
        test_period_end: "ENTER CURRENT DATE" # ?
        log_ref: "00001" # ?
        log_ret_date: "ENTER CURRENT DATE" # ?
    comments:
      - author: "ENTER AUTHOR NAME"
        comment: "THIS IS A TEST RUN ONLY, RESULTS ARE NOT VALID!"
  tests:
    - iut:
        type: "PS"
        name: "IF_PS_OSP"
        version: "0.0.0.1"
        test_period: "ENTER CURRENT DATE"
        date_of_receipt: "ENTER CURRENT DATE"
        location: "ENTER LOCATION"
        cs_id: "CS00001"
      lab_config: "templates/ALL_TESTS/PS/lab_config_ps.yaml"  # Path to lab_config for this test
      requirements: ["RQ_PS_004", "RQ_PS_005", "RQ_PS_006", "RQ_PS_007", "RQ_PS_028", "RQ_PS_008","RQ_PS_010",
                   "RQ_PS_025", "RQ_PS_026", "RQ_PS_030","RQ_PS_013", "RQ_PS_014", "RQ_PS_016", "RQ_PS_017",
                   "RQ_PS_019", "RQ_PS_029", "RQ_PS_032", "RQ_PS_021", "RQ_PS_027", "RQ_PS_031", "RQ_PS_034",
                   "RQ_PS_044", "RQ_PS_039", "RQ_PS_001"]
