lab_config:
  pca_certificate_file: ""  # TLS certificate file for secure connections
  pca_certificate_key: ""   # TLS private key matching the certificate
  test_suite_host_ip: "10.140.140.253"    # IP of the machine running the test suite
  entities:
    # Test System ESRP
    - name: "ESRP"           # Emergency Services Routing Proxy acting as sender
      mode: "STUB_SERVER"    # Simulated server for test stimulus
      function: "ESRP"
      role: ["SENDER"]
      fqdn: ""               # Fully qualified domain name for routing
      certificate_file: ""   # X.509 certificate for TLS
      certificate_key: ""    # Private key for TLS
      interfaces:
        - name: "IF_ESRP_ECRF-LVF"  # Interface between ESRP and ECRF-LVF
          fqdn: ""
          ip: "10.140.140.131"
          mask: "255.255.255.128"
          gateway: ""         # Leave empty if not required
          dns: [ ]            # Leave empty if not required
          port_mapping:
            - name: "IF_ESRP_ECRF-LVF_HTTP_4443_TLSv1.2"
              protocol: "HTTP"
              port: 4443
              transport_protocol: "TLSv1.2"  # HTTPS over TLS 1.2
            - name: "IF_ESRP_ECRF-LVF_HTTP_8080_TCP"
              protocol: "HTTP"
              port: 8080
              transport_protocol: "TCP"
    - name: "ECRF-LVF"       # Emergency Call Routing Function / Location Validation Function under test
      mode: "REAL_DEVICE"    # Physical device in the testbed
      function: "ECRF-LVF"
      role: ["IUT"]            # Implementation Under Test
      fqdn: ""
      certificate_file: ""
      certificate_key: ""
      api_http_url_prefix: ""  # Optional
      api:
        http_url_suffix_lost: ""  # F.e. for http://IP:PORT/lost provide '/lost'
      interfaces:
        - name: "IF_ECRF-LVF_ESRP"
          fqdn: ""
          ip: "192.168.49.113"
          mask: "255.255.255.0"
          gateway: ""         # Leave empty if not required
          dns: [ ]            # Leave empty if not required
          port_mapping:
#            - name: "IF_ECRF-LVF_ESRP_HTTP_4443_TLSv1.2"
#              protocol: "HTTP"
#              port: 4443
#              transport_protocol: "TLSv1.2"
            - name: "IF_ECRF-LVF_ESRP_HTTP_8080_TCP"
              protocol: "HTTP"
              port: 8080
              transport_protocol: "TCP"
        - name: "IF_ECRF-LVF_TS-ECRF-LVF"
          fqdn: ""
          ip: "192.168.49.113"
          mask: "255.255.255.0"
          gateway: ""         # Leave empty if not required
          dns: [ ]            # Leave empty if not required
          port_mapping:
            - name: "IF_ECRF-LVF_TS-ECRF-LVF_HTTP_8080_TCP"
              protocol: "HTTP"
              port: 8080
              transport_protocol: "TCP"
    - name: "TS-ECRF-LVF"    # Test System acting as ECRF-LVF receiver
      mode: "STUB_SERVER"
      function: "ECRF-LVF"
      role: ["RECEIVER"]       # Receives responses from the IUT
      fqdn: ""
      certificate_file: ""
      certificate_key: ""
      interfaces:
        - name: "IF_TS-ECRF-LVF_ECRF-LVF"
          fqdn: ""
          ip: "10.140.140.132"
          mask: "255.255.255.128"
          gateway: ""         # Leave empty if not required
          dns: [ ]            # Leave empty if not required
          port_mapping:
            - name: "IF_TS-ECRF-LVF_ECRF-LVF_HTTP_8080_TCP"
              protocol: "HTTP"
              port: 8080
              transport_protocol: "TCP"