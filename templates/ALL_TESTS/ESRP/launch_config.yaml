launch_config:
  output_folder: "/tmp/lab_tests/"
  global_config:
    lab_info: "templates/ALL_TESTS/lab_info.yaml"
    type: "conformance"
    log:
      level: "DEBUG"
      output_file: "ESRP_DEBUG.log"
    report_files:
      prefix: "ESRP"
      suffix: "ESRP_ALL_TESTS" # optional
      output_folder_path: "" # empty if you want to have reports in TS root dir or absolute path to the FOLDER
      detailed_view: true
      types:
        - "docx"
        - "pdf"
    id_summary:
      eng_name: "ENTER NAME"
      supplier:
        name: "ENTER SUPPLIER NAME"
        addr_line_1: "ENTER ADDRESS"
        addr_line_2: ""
        city: "ENTER CITY"
        state: "ENTER STATE"
        country: "ENTER COUNTRY"
        zip: "ENTER ZIP CODE"
        url: "ENTER URL"
      test_env:
        ts_version: "4.0.2"
        ixit_id: "11111"
        test_period_start: "ENTER CURRENT DATE" # ?
        test_period_end: "ENTER CURRENT DATE" # ?
        log_ref: "00001" # ?
        log_ret_date: "ENTER CURRENT DATE" # ?
    comments:
      - author: "ENTER AUTHOR NAME"
        comment: "THIS IS A TEST RUN ONLY, RESULTS ARE NOT VALID!"
  tests:
   - iut:
       type: "ESRP"
       name: "IF_ESRP_OSP"
       version: "0.0.0.1"
       test_period: "ENTER CURRENT DATE"
       date_of_receipt: "ENTER CURRENT DATE"
       location: "ENTER LOCATION"
       cs_id: "CS00001"
     lab_config: "templates/ALL_TESTS/ESRP/lab_config_esrp.yaml"
     requirements: ['RQ_ESRP_005', 'RQ_ESRP_006', 'RQ_ESRP_007', 'RQ_ESRP_008', 'RQ_ESRP_017', 'RQ_ESRP_024', 'RQ_ESRP_025', 'RQ_ESRP_026', 'RQ_ESRP_027', 'RQ_ESRP_033', 'RQ_ESRP_034', 'RQ_ESRP_042', 'RQ_ESRP_043', 'RQ_ESRP_045', 'RQ_ESRP_046', 'RQ_ESRP_048', 'RQ_ESRP_049', 'RQ_ESRP_055', 'RQ_ESRP_204']