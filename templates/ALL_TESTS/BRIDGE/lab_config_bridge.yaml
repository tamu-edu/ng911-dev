lab_config:
  pca_certificate_file: ""  # TLS certificate file for secure connections
  pca_certificate_key: ""   # TLS private key matching the certificate
  test_suite_host_ip: "10.140.140.253"    # IP of the machine running the test suite
  entities:
    # Test System
    - name: "BCF"             # Simulated BCF stimulus generator
      mode: "STUB_SERVER"     # Acts as a stub server for test traffic
      function: "BCF"         # Border Control Function
      role: ["SENDER"]          # Initiates SIP calls in test scenarios
      fqdn: ""                # Fully qualified domain name for routing
      certificate_file: ""    # X.509 certificate for TLS
      certificate_key: ""     # Private key for TLS
      interfaces:
        - name: "IF_BCF_BRIDGE" # Interface between BCF and BRIDGE
          fqdn: ""
          ip: "10.140.140.131"             # Interface IP address
          mask: "255.255.255.128"          # Network mask
          gateway: ""         # Leave empty if not required
          dns: [ ]            # Leave empty if not required
          port_mapping:
            - name: "IF_BCF_BRIDGE_SIP_5060_TCP"
              protocol: "SIP"  # Session Initiation Protocol for call signaling
              port: 5060       # Standard SIP port
              transport_protocol: "TCP"
    - name: "BRIDGE"          # Bridge device under test
      mode: "REAL_DEVICE"     # Physical/real device in the testbed
      function: "BRIDGE"      # Conference bridge function
      role: ["IUT"]             # Implementation Under Test
      fqdn: ""
      certificate_file: ""
      certificate_key: ""
      api:
        conference_sip_uri_username: ""  # SIP username for conference API
      interfaces:
        - name: "IF_BRIDGE_BCF"
          fqdn: ""
          ip: "192.168.49.106"
          mask: "255.255.255.0"
          gateway: ""         # Leave empty if not required
          dns: [ ]            # Leave empty if not required
          port_mapping:
            - name: "IF_BRIDGE_BCF_SIP_5060_TCP"
              protocol: "SIP"
              port: 5060
              transport_protocol: "TCP"