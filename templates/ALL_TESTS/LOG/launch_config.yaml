launch_config:
  output_folder: "/tmp/lab_tests/"
  global_config:
    lab_info: "templates/ALL_TESTS/lab_info.yaml"
    type: "conformance"
    log:
      level: "DEBUG"
      output_file: "LOG_DEBUG.log"
    report_files:
      prefix: "LOG"
      suffix: "LOG_ALL_TESTS" # optional
      output_folder_path: "" # empty if you want to have reports in TS root dir or absolute path to the FOLDER
      detailed_view: true
      types:
        - "docx"
        - "pdf"
    id_summary:
      eng_name: "ENTER NAME"
      supplier:
        name: "ENTER SUPPLIER NAME"
        addr_line_1: "ENTER ADDRESS"
        addr_line_2: ""
        city: "ENTER CITY"
        state: "ENTER STATE"
        country: "ENTER COUNTRY"
        zip: "ENTER ZIP CODE"
        url: "ENTER URL"
      test_env:
        ixit_id: "11111"
        test_method: "test_method"
        test_period_start: "ENTER CURRENT DATE" # ?
        test_period_end: "ENTER CURRENT DATE" # ?
        log_ref: "00001" # ?
        log_ret_date: "ENTER CURRENT DATE" # ?
    comments:
      - author: "ENTER AUTHOR NAME"
        comment: "THIS IS A TEST RUN ONLY, RESULTS ARE NOT VALID!"
  tests:
   - iut:
       type: "LOG"
       name: "IF_LOG_OSP"
       version: "0.0.0.1"
       date_of_receipt: "ENTER CURRENT DATE"
       location: "ENTER LOCATION"
       cs_id: "CS00001"
     lab_config: "templates/ALL_TESTS/LOG/lab_config_log.yaml"
     requirements: ['RQ_LOG_002', 'RQ_LOG_003', 'RQ_LOG_026', 'RQ_LOG_028', 'RQ_LOG_030', 'RQ_LOG_032', 'RQ_LOG_034',
                    'RQ_LOG_036', 'RQ_LOG_037', 'RQ_LOG_038', 'RQ_LOG_039', 'RQ_LOG_041', 'RQ_LOG_042', 'RQ_LOG_044',
                    'RQ_LOG_054', 'RQ_LOG_055', 'RQ_LOG_058', 'RQ_LOG_059', 'RQ_LOG_218']
