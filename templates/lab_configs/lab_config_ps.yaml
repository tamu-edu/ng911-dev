# This configuration file defines the physical and network layout of the test environment.
# It tells the test suite which network entities are involved in the test (e.g. OSP, BCF, ESRP),
# how they are connected to each other, and what network settings and protocols each connection uses.
# The test suite loads this file at startup, validates it, and uses it to automatically launch and
# configure stub server entities before each test run. This file is specific to the functional element
# being tested (e.g. BCF, ESRP) and will need to be filled out to match your actual lab network setup.
lab_config:

  # Path to the Certificate Authority certificate used to validate TLS/mTLS connections between lab entities.
  # Only required if one or more interfaces are configured with mTLSv1.2 or mTLSv1.3 transport. e.g. /path/to/ca.crt
  pca_certificate_file: ""

  # Path to the private key corresponding to the CA certificate above.
  # Only required if one or more interfaces are configured with mTLSv1.2 or mTLSv1.3 transport. e.g. /path/to/ca.key
  pca_certificate_key: ""

  # IP address of the machine running the test suite; must match one of its local network interface IPs. e.g. 192.168.1.10
  test_suite_host_ip: ""

  # Entities represent each network element involved in the test scenario.
  # Each entity is either a real device on the network (REAL_DEVICE) or simulated by the test suite (STUB_SERVER).
  # The test suite launches and manages stub server entities automatically during test execution,
  # while real device entities are expected to already be running on the network.
  entities:

      # ESRP (Emergency Services Routing Proxy) is simulated as a STUB_SERVER that acts as the stimulus
      # sender in PS tests. It sends HTTP POST requests to store JWS-signed policy objects on the PS IUT,
      # and HTTP GET, PUT, and DELETE requests to query, update, and remove policies. It also verifies
      # that the PS correctly rejects malformed or expired policies.
    - name: "ESRP"

      # STUB_SERVER = simulated by the test suite; REAL_DEVICE = a real physical device on the network
      mode: "STUB_SERVER"

      # The functional role of this entity; used by the test suite to determine which protocol
      # (SIP or HTTP) to use when communicating with this entity. Valid values: OSP, BCF, ESRP, LIS, LOG, ECRF-LVF, PS, BRIDGE, CHFE, ADR
      function: "ESRP"

      # How this entity behaves in tests. Accepts one or more values as a list.
      # SENDER = initiates requests, RECEIVER = listens for incoming requests, IUT = the real device being tested
      role: ["SENDER"]

      # Fully qualified domain name of this entity; used to build request URIs (e.g. sip:host:port or https://host:port).
      # Priority order when building URIs: interface-level FQDN -> entity-level FQDN -> interface IP.
      # Leave empty if the interface-level FQDN or IP should be used instead.
      fqdn: ""

      # Path to this entity's TLS certificate; required for TLS and mTLS connections.
      # Also used as the JWS signing certificate: the test suite extracts this value via extract_field
      # to sign policy JSON objects with generate_jws before POSTing them to the PS.
      certificate_file: ""

      # Path to the private key for this entity's TLS certificate; required for TLS and mTLS connections.
      # Also used as the JWS signing key alongside certificate_file above.
      certificate_key: ""

      # Interfaces define the individual network connections this entity has with other entities in the lab.
      # Each interface maps to a directional link between two entities (e.g. IF_ESRP_PS = ESRP connecting to PS)
      # and specifies the network settings and protocols the test suite will use when sending or receiving traffic on that link.
      # The naming convention IF_<source>_<target> is enforced by the test suite, which splits the interface name
      # to locate the corresponding interface on the target entity (e.g. IF_ESRP_PS -> IF_PS_ESRP).
      interfaces:

          # Network interface connecting ESRP to PS
        - name: "IF_ESRP_PS"

          # FQDN for this specific interface; takes priority over the entity-level FQDN when building URIs
          fqdn: ""

          # IP address the test suite will assign to this machine to represent the ESRP side of the ESRP-PS connection (e.g. 192.168.1.10)
          ip: ""

          # Subnet mask for the ESRP-PS interface IP above; used to calculate which subnet this connection belongs to (e.g. 255.255.255.0)
          mask: ""

          # Default gateway for the ESRP-PS Docker network; used when creating the Docker network that connects the ESRP and PS containers. Leave empty if not required
          gateway: ""

          # List of DNS server IP addresses for this interface; must be valid IPv4 or IPv6 addresses. Leave empty if not required
          dns: [ ]

          # Defines the protocol and port combinations this interface uses during tests.
          # Each entry results in the test suite launching a separate stub server instance bound to the specified
          # port and transport protocol on the ESRP-PS connection. The port mapping name is also used by the
          # test suite to match this interface against the relevant variation in the test config, so only the
          # port mappings required for the tests being run need to be active.
          port_mapping:

              # Naming convention: IF_<source>_<target>_<protocol>_<port>_<transport>;
              # this name is matched against the test variation config to determine which stub server to launch for a given test
            - name: "IF_ESRP_PS_HTTP_8080_TCP"

              # Application protocol; valid values: SIP, HTTP, HTTPS, DNS, TCP, UDP, ICMP, ARP
              protocol: "HTTP"

              # Port number (0-65535)
              port: 8080

              # Transport protocol; valid values: TCP, UDP, SCTP, TLSv1.2, TLSv1.3, mTLSv1.2, mTLSv1.3
              transport_protocol: "TCP"

      # PS (Policy Store) is the device under test in this lab configuration. It stores JWS-signed policy
      # objects submitted by functional elements, serves them on HTTP GET requests, and enforces validation
      # rules including JWS signature verification, policy expiration, and ruleset correctness.
      # It exposes REST entrypoints at /Versions, /Policies, and related paths.
    - name: "PS"

      # STUB_SERVER = simulated by the test suite; REAL_DEVICE = a real physical device on the network
      mode: "REAL_DEVICE"

      # The functional role of this entity; used by the test suite to determine which protocol
      # (SIP or HTTP) to use when communicating with this entity. Valid values: OSP, BCF, ESRP, LIS, LOG, ECRF-LVF, PS, BRIDGE, CHFE, ADR
      function: "PS"

      # How this entity behaves in tests. Accepts one or more values as a list.
      # SENDER = initiates requests, RECEIVER = listens for incoming requests, IUT = the real device being tested
      role: ["IUT"]

      # Fully qualified domain name of this entity; used to build request URIs (e.g. sip:host:port or https://host:port).
      # Priority order when building URIs: interface-level FQDN -> entity-level FQDN -> interface IP.
      # Leave empty if the interface-level FQDN or IP should be used instead.
      fqdn: ""

      # Path to this entity's TLS certificate; required for TLS and mTLS connections
      certificate_file: ""

      # Path to the private key for this entity's TLS certificate; required for TLS and mTLS connections
      certificate_key: ""

      # Optional path prefix appended to the base URL when the stub server sends HTTP requests to this entity.
      # Used when the IUT hosts its HTTP API under a non-root path (e.g. '/api/v1'). The stub server reads
      # this value via _get_target_api_prefix (stub_server_service.py) and prepends it to the request path.
      # Leave empty if the IUT serves requests at the root path.
      api_http_url_prefix: ""

      # Interfaces define the individual network connections this entity has with other entities in the lab.
      # Each interface maps to a directional link between two entities (e.g. IF_PS_ESRP = PS connecting to ESRP)
      # and specifies the network settings and protocols the test suite will use when sending or receiving traffic on that link.
      # The naming convention IF_<source>_<target> is enforced by the test suite, which splits the interface name
      # to locate the corresponding interface on the target entity (e.g. IF_PS_ESRP -> IF_ESRP_PS).
      interfaces:

          # Network interface on which the PS IUT receives HTTP requests from the ESRP stub;
          # used for POST /Policies (store policy), GET /Policies (retrieve policy),
          # PUT /Policies (update policy), DELETE /Policies (remove policy), and GET /Versions.
        - name: "IF_PS_ESRP"

          # FQDN for this specific interface; takes priority over the entity-level FQDN when building URIs
          fqdn: ""

          # IP address the test suite will assign to this machine to represent the PS side of the PS-ESRP connection (e.g. 192.168.1.10)
          ip: ""

          # Subnet mask for the PS-ESRP interface IP above; used to calculate which subnet this connection belongs to (e.g. 255.255.255.0)
          mask: ""

          # Default gateway for the PS-ESRP Docker network; used when creating the Docker network that connects the PS and ESRP containers. Leave empty if not required
          gateway: ""

          # List of DNS server IP addresses for this interface; must be valid IPv4 or IPv6 addresses. Leave empty if not required
          dns: [ ]

          # Defines the protocol and port combinations this interface uses during tests.
          # Each entry results in the test suite launching a separate stub server instance bound to the specified
          # port and transport protocol on the PS-ESRP connection. The port mapping name is also used by the
          # test suite to match this interface against the relevant variation in the test config, so only the
          # port mappings required for the tests being run need to be active.
          port_mapping:

              # Naming convention: IF_<source>_<target>_<protocol>_<port>_<transport>;
              # this name is matched against the test variation config to determine which stub server to launch for a given test
            - name: "IF_PS_ESRP_HTTP_8080_TCP"

              # Application protocol; valid values: SIP, HTTP, HTTPS, DNS, TCP, UDP, ICMP, ARP
              protocol: "HTTP"

              # Port number (0-65535)
              port: 8080

              # Transport protocol; valid values: TCP, UDP, SCTP, TLSv1.2, TLSv1.3, mTLSv1.2, mTLSv1.3
              transport_protocol: "TCP"

          # Network interface on which the PS IUT receives HTTP POST /Policies requests from the TMFE stub.
        - name: "IF_PS_TMFE"

          # FQDN for this specific interface; takes priority over the entity-level FQDN when building URIs
          fqdn: ""

          # IP address the test suite will assign to this machine to represent the PS side of the PS-TMFE connection (e.g. 192.168.1.10)
          ip: ""

          # Subnet mask for the PS-TMFE interface IP above; used to calculate which subnet this connection belongs to (e.g. 255.255.255.0)
          mask: ""

          # Default gateway for the PS-TMFE Docker network; used when creating the Docker network that connects the PS and TMFE containers. Leave empty if not required
          gateway: ""

          # List of DNS server IP addresses for this interface; must be valid IPv4 or IPv6 addresses. Leave empty if not required
          dns: [ ]

          # Defines the protocol and port combinations this interface uses during tests.
          # Each entry results in the test suite launching a separate stub server instance bound to the specified
          # port and transport protocol on the PS-TMFE connection. The port mapping name is also used by the
          # test suite to match this interface against the relevant variation in the test config, so only the
          # port mappings required for the tests being run need to be active.
          port_mapping:

              # Naming convention: IF_<source>_<target>_<protocol>_<port>_<transport>;
              # this name is matched against the test variation config to determine which stub server to launch for a given test
            - name: "IF_PS_TMFE_HTTP_8080_TCP"

              # Application protocol; valid values: SIP, HTTP, HTTPS, DNS, TCP, UDP, ICMP, ARP
              protocol: "HTTP"

              # Port number (0-65535)
              port: 8080

              # Transport protocol; valid values: TCP, UDP, SCTP, TLSv1.2, TLSv1.3, mTLSv1.2, mTLSv1.3
              transport_protocol: "TCP"

      # TMFE (Test Management Functional Element) is simulated as a STUB_SERVER used exclusively in
      # TD_PS_010.md (Policies expiration). It sends an HTTP POST /Policies request to the PS IUT to
      # pre-load a JWS-signed policy object with a short policyExpirationTime. After the policy expires,
      # the ESRP stub then sends an HTTP GET to verify the PS correctly rejects the expired policy with
      # a 4xx response. function: "BCF" is used as there is no dedicated TMFE function type in the test suite.
    - name: "TMFE"

      # STUB_SERVER = simulated by the test suite; REAL_DEVICE = a real physical device on the network
      mode: "STUB_SERVER"

      # The functional role of this entity; used by the test suite to select the correct protocol
      # handler. BCF is used here as the generic function type for all SIP-capable functional elements.
      # Valid values: OSP, BCF, ESRP, LIS, LOG, ECRF-LVF, PS, BRIDGE, CHFE, ADR
      function: "BCF"

      # How this entity behaves in tests. Accepts one or more values as a list.
      # SENDER = initiates requests, RECEIVER = listens for incoming requests, IUT = the real device being tested
      role: ["SENDER"]

      # Fully qualified domain name of this entity; used to build request URIs (e.g. sip:host:port or https://host:port).
      # Priority order when building URIs: interface-level FQDN -> entity-level FQDN -> interface IP.
      # Leave empty if the interface-level FQDN or IP should be used instead.
      fqdn: ""

      # Path to this entity's TLS certificate; required for TLS and mTLS connections
      certificate_file: ""

      # Path to the private key for this entity's TLS certificate; required for TLS and mTLS connections
      certificate_key: ""

      # Interfaces define the individual network connections this entity has with other entities in the lab.
      # Each interface maps to a directional link between two entities (e.g. IF_TMFE_PS = TMFE connecting to PS)
      # and specifies the network settings and protocols the test suite will use when sending or receiving traffic on that link.
      # The naming convention IF_<source>_<target> is enforced by the test suite, which splits the interface name
      # to locate the corresponding interface on the target entity (e.g. IF_TMFE_PS -> IF_PS_TMFE).
      interfaces:

          # Network interface connecting TMFE to PS (sends HTTP POST /Policies to pre-load an expiring policy)
        - name: "IF_TMFE_PS"

          # FQDN for this specific interface; takes priority over the entity-level FQDN when building URIs
          fqdn: ""

          # IP address the test suite will assign to this machine to represent the TMFE side of the TMFE-PS connection (e.g. 192.168.1.10)
          ip: ""

          # Subnet mask for the TMFE-PS interface IP above; used to calculate which subnet this connection belongs to (e.g. 255.255.255.0)
          mask: ""

          # Default gateway for the TMFE-PS Docker network; used when creating the Docker network that connects the TMFE and PS containers. Leave empty if not required
          gateway: ""

          # List of DNS server IP addresses for this interface; must be valid IPv4 or IPv6 addresses. Leave empty if not required
          dns: [ ]

          # Defines the protocol and port combinations this interface uses during tests.
          # Each entry results in the test suite launching a separate stub server instance bound to the specified
          # port and transport protocol on the TMFE-PS connection. The port mapping name is also used by the
          # test suite to match this interface against the relevant variation in the test config, so only the
          # port mappings required for the tests being run need to be active.
          port_mapping:

              # Naming convention: IF_<source>_<target>_<protocol>_<port>_<transport>;
              # this name is matched against the test variation config to determine which stub server to launch for a given test
            - name: "IF_TMFE_PS_HTTP_8080_TCP"

              # Application protocol; valid values: SIP, HTTP, HTTPS, DNS, TCP, UDP, ICMP, ARP
              protocol: "HTTP"

              # Port number (0-65535)
              port: 8080

              # Transport protocol; valid values: TCP, UDP, SCTP, TLSv1.2, TLSv1.3, mTLSv1.2, mTLSv1.3
              transport_protocol: "TCP"