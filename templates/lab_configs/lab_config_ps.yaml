lab_config:
  pca_certificate_file: ""   # PCA TLS certificate file
  pca_certificate_key: ""    # PCA TLS private key
  test_suite_host_ip: ""     # Test suite host IP
  entities:
    # Test System (ESRP)
    - name: "ESRP"
      mode: "STUB_SERVER"     # Stubbed system sending requests
      function: "ESRP"
      role: ["SENDER"]
      fqdn: ""
      certificate_file: ""     # X.509 certificate for TLS
      certificate_key: ""      # Private key for TLS
      interfaces:
        - name: "IF_ESRP_PS"
          fqdn: ""
          ip: ""              # ESRP source IP
          mask: ""
          gateway: ""          # Leave empty if not required
          dns: [ ]             # Leave empty if not required
          port_mapping:
            - name: "IF_ESRP_PS_HTTP_8080_TCP"
              protocol: "HTTP"
              port: 8080
              transport_protocol: "TCP"
    # Policy Store (PS - IUT)
    - name: "PS"
      mode: "REAL_DEVICE"     # Actual device under test
      function: "PS"
      role: ["IUT"]
      fqdn: ""
      certificate_file: ""
      certificate_key: ""
      api_http_url_prefix: ""  # Optional
      interfaces:
        - name: "IF_PS_ESRP"
          fqdn: ""
          ip: ""              # PS IP for ESRP connection
          mask: ""
          gateway: ""          # Leave empty if not required
          dns: [ ]             # Leave empty if not required
          port_mapping:
            - name: "IF_PS_ESRP_HTTP_8080_TCP"
              protocol: "HTTP"
              port: 8080
              transport_protocol: "TCP"
        - name: "IF_PS_TMFE"
          fqdn: ""
          ip: ""              # PS IP for ESRP connection
          mask: ""
          gateway: ""          # Leave empty if not required
          dns: [ ]             # Leave empty if not required
          port_mapping:
            - name: "IF_PS_TMFE_HTTP_8080_TCP"
              protocol: "HTTP"
              port: 8080
              transport_protocol: "TCP"
    # Test Management FE
    - name: "TMFE"
      mode: "STUB_SERVER"     # Stubbed system sending requests
      function: "BCF"
      role: ["SENDER"]
      fqdn: ""
      certificate_file: ""     # X.509 certificate for TLS
      certificate_key: ""      # Private key for TLS
      interfaces:
        - name: "IF_TMFE_PS"
          fqdn: ""
          ip: ""              # ESRP source IP
          mask: ""
          gateway: ""          # Leave empty if not required
          dns: [ ]             # Leave empty if not required
          port_mapping:
            - name: "IF_TMFE_PS_HTTP_8080_TCP"
              protocol: "HTTP"
              port: 8080
              transport_protocol: "TCP"