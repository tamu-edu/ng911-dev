          ip: ""
          mask: ""
          gateway: ""  #  Leave empty if not required
          dns: [ ]  #  Leave empty if not required
          port_mapping:
            - name: "IF_OSP_BRIDGE_SIP_5060_TCP"
              protocol: "SIP"
              port: 5060
              transport_protocol: "TCP"
    # Test System
    - name: "BCF"             # Simulated BCF stimulus generator
      mode: "STUB_SERVER"     # Acts as a stub server for test traffic
      function: "BCF"         # Border Control Function
      role: ["SENDER"]          # Initiates SIP calls in test scenarios
      fqdn: ""                # Fully qualified domain name for routing
      certificate_file: ""    # X.509 certificate for TLS
      certificate_key: ""     # Private key for TLS
      interfaces:
        - name: "IF_BCF_OSP"
          fqdn: ""
