lab_config:
  pca_certificate_file: ""  # TLS certificate file for secure connections
  pca_certificate_key: ""   # TLS private key matching the certificate
  test_suite_host_ip: ""    # IP of the machine running the test suite
  entities:
    # Test System OSP
    - name: "OSP"
      mode: "STUB_SERVER"
      function: "OSP"
      role: ["SENDER"]
      fqdn: ""
      certificate_file: ""
      certificate_key: ""
      api:
        tel_number: ""
      interfaces:
        - name: "IF_OSP_BCF"
          fqdn: ""
          ip: ""
          mask: ""
          gateway: ""  #  Leave empty if not required
          dns: [ ]  #  Leave empty if not required
          port_mapping:
            - name: "IF_OSP_BCF_SIP_5060_TCP"
              protocol: "SIP"
              port: 5060
              transport_protocol: "TCP"
        - name: "IF_OSP_CHFE"
          fqdn: ""
          ip: ""
          mask: ""
          gateway: ""  #  Leave empty if not required
          dns: [ ]  #  Leave empty if not required
