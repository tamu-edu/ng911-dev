      # ESRP (Emergency Services Routing Proxy) is simulated as a STUB_SERVER that acts as the receiving end
      # of the SIP session inside the ESInet. In these tests it listens for SIP messages forwarded by the BCF,
      # allowing the test suite to verify that the BCF correctly routes calls toward the ESRP.
    - name: "ESRP"

      # STUB_SERVER = simulated by the test suite; REAL_DEVICE = a real physical device on the network
      mode: "STUB_SERVER"

      # The functional role of this entity; used by the test suite to determine which protocol
      # (SIP or HTTP) to use when communicating with this entity. Valid values: OSP, BCF, ESRP, LIS, LOG, ECRF-LVF, PS, BRIDGE, CHFE, ADR
