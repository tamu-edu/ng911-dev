lab_config:
  pca_certificate_file: ""       # PCA-issued certificate for TLS authentication
  pca_certificate_key: ""        # Private key matching PCA certificate
  test_suite_host_ip: ""         # IP address of the test suite controller
  entities:
    # Test System ESRP (Stimulus sender)
    - name: "ESRP"
      mode: "STUB_SERVER"        # Acts as a stub server to send test traffic
      function: "ESRP"           # Emergency Services Routing Proxy
      role: ["SENDER"]             # Initiates SIP/HTTP requests
      fqdn: ""                   # Fully Qualified Domain Name
      certificate_file: ""       # TLS certificate
      certificate_key: ""        # TLS key
      interfaces:
        - name: "IF_ESRP_LIS"    # Interface between ESRP and LIS
          fqdn: ""
          ip: ""
          mask: ""
          gateway: ""            # Leave empty if not required
          dns: [ ]               # Leave empty if not required
          port_mapping:
#            - name: "IF_ESRP_LIS_SIP_5061_TLSv1.2"
#              protocol: "SIP"
#              port: 5061
#              transport_protocol: "TLSv1.2"
            - name: "IF_ESRP_LIS_SIP_5060_TCP"
              protocol: "SIP"    # Session Initiation Protocol for signaling
              port: 5060
              transport_protocol: "TCP"
            - name: "IF_ESRP_LIS_HTTP_8080_TCP"
              protocol: "HTTP"   # Used for HELD/LoST location queries
              port: 8080
              transport_protocol: "TCP"
    # LIS Under Test
    - name: "LIS"
      mode: "REAL_DEVICE"        # Physical LIS device under test
      function: "LIS"            # Location Information Server
      role: ["IUT"]                # Implementation Under Test
      fqdn: ""
      certificate_file: ""
      certificate_key: ""
      api_http_url_prefix: ""  # Optional
      api:                       # All values listed to be added manually
        http_url_suffix_held: "" # F.e. for http://IP:PORT/location provide '/location'
        sip_uri_user: ""         # SIP URI user part for Presence Event Package
        device_uri: ""           # LIS_002: SIP URI/tel of target device known by LIS. Used for getting its locationURI
      interfaces:
        - name: "IF_LIS_ESRP"
          fqdn: ""
          ip: ""
          mask: ""
          gateway: ""  #  Leave empty if not required
          dns: [ ] #  Leave empty if not required
          port_mapping:
#            - name: "IF_LIS_ESRP_SIP_5061_TLSv1.2"
#              protocol: "SIP"
#              port: 5061
#              transport_protocol: "TLSv1.2"
            - name: "IF_LIS_ESRP_SIP_5060_TCP"
              protocol: "SIP"
              port: 5060
              transport_protocol: "TCP"
            - name: "IF_LIS_ESRP_HTTP_8080_TCP"
              protocol: "HTTP"
              port: 8080
              transport_protocol: "TCP"