lab_config:
  pca_certificate_file: ""  # TLS certificate file for secure connections
  pca_certificate_key: ""   # TLS private key matching the certificate
  test_suite_host_ip: ""    # IP of the machine running the test suite
  entities:
    # Test System OSP
    - name: "OSP"             # Simulated BCF stimulus generator
      mode: "STUB_SERVER"     # Acts as a stub server for SIP signaling
      function: "OSP"
      role: ["SENDER"]          # Initiates SIP calls in scenarios
      fqdn: ""                # Fully qualified domain name for routing
      certificate_file: ""    # X.509 certificate for TLS
      certificate_key: ""     # Private key for TLS
      interfaces:
        - name: "IF_OSP_FE"   # Interface between BCF and FE
          fqdn: ""
          ip: ""              # Interface IP address
          mask: ""            # Network mask
          gateway: ""         # Leave empty if not required
          dns: [ ]            # Leave empty if not required
          port_mapping:
            - name: "IF_BCF_FE_SIP_5060_TCP"
              protocol: "SIP"  # Session Initiation Protocol for call signaling
              port: 5060       # Standard SIP port
              transport_protocol: "TCP"
    # All call stateful functional elements
    - name: "FE"              # Call handling element under test
      mode: "REAL_DEVICE"     # Physical/real device in the testbed
      function: "BCF"
      role: ["IUT"]             # Implementation Under Test
      fqdn: ""
      certificate_file: ""
      certificate_key: ""
      interfaces:
        - name: "IF_FE_OSP"   # Interface between FE and BCF
          fqdn: ""
          ip: ""
          mask: ""
          gateway: ""         # Leave empty if not required
          dns: [ ]            # Leave empty if not required
          port_mapping:
            - name: "IF_FE_OSP_SIP_5060_TCP"
              protocol: "SIP"
              port: 5060
              transport_protocol: "TCP"
        - name: "IF_FE_LOG"   # Interface between FE and LOG
          fqdn: ""
          ip: ""
          mask: ""
          gateway: ""         # Leave empty if not required
          dns: [ ]            # Leave empty if not required
          port_mapping:
            - name: "IF_FE_LOG_HTTP_8080_TCP"
              protocol: "HTTP" # For HTTP-based log transfer
              port: 8080       # Common alternative HTTP port
              transport_protocol: "TCP"
    # Test System LOG
    - name: "LOG"             # Simulated log service
      mode: "STUB_SERVER"     # Acts as a stub server for HTTP requests
      function: "LOG"
      role: ["RECEIVER"]          # Sends HTTP messages
      fqdn: ""
      certificate_file: ""
      certificate_key: ""
      interfaces:
        - name: "IF_LOG_FE"   # Interface between LOG and FE
          fqdn: ""
          ip: ""
          mask: ""
          gateway: ""         # Leave empty if not required
          dns: [ ]            # Leave empty if not required
          port_mapping:
            - name: "IF_LOG_FE_HTTP_8080_TCP"
              protocol: "HTTP"
              port: 8080
              transport_protocol: "TCP"