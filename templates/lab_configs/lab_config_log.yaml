lab_config:
  pca_certificate_file: ""       # PCA-issued certificate for TLS authentication
  pca_certificate_key: ""        # Private key matching PCA certificate
  test_suite_host_ip: ""         # IP address of the test suite controller
  entities:
    # Test System ESRP (Stimulus sender)
    - name: "ESRP"
      mode: "STUB_SERVER"        # Acts as a stub server to send test HTTP requests
      function: "ESRP"           # Emergency Services Routing Proxy
      role: ["SENDER"]             # Initiates HTTP requests for logging
      fqdn: ""                   # Fully Qualified Domain Name
      certificate_file: ""       # TLS certificate
      certificate_key: ""        # TLS key
      interfaces:
        - name: "IF_ESRP_LOG"    # Interface between ESRP and LOG service
          fqdn: ""
          ip: ""
          mask: ""
          gateway: ""            # Leave empty if not required
          dns: [ ]               # Leave empty if not required
          port_mapping:
            - name: "IF_ESRP_LOG_HTTP_8080_TCP"
              protocol: "HTTP"   # HTTP traffic for log submission
              port: 8080
              transport_protocol: "TCP"
    # Logging Service (Implementation Under Test)
    - name: "LOG"
      mode: "REAL_DEVICE"        # Physical logging service under test
      function: "LOG"            # Service receiving and storing logs
      role: ["IUT"]                # Implementation Under Test
      fqdn: ""
      certificate_file: ""
      certificate_key: ""
      api_http_url_prefix: ""  # Optional
      interfaces:
        - name: "IF_LOG_ESRP"
          fqdn: ""
          ip: ""
          mask: ""
          gateway: ""            # Leave empty if not required
          dns: [ ]               # Leave empty if not required
          port_mapping:
            - name: "IF_LOG_ESRP_HTTP_8080_TCP"
              protocol: "HTTP"   # Receives HTTP requests from ESRP
              port: 8080
              transport_protocol: "TCP"
        - name: "IF_LOG_LIS"
          fqdn: ""
          ip: ""
          mask: ""
          gateway: ""            # Leave empty if not required
          dns: [ ]               # Leave empty if not required
          port_mapping:
            - name: "IF_LOG_LIS_HTTP_8443_TLSv1.3"
              protocol: "HTTP"
              port: 8443
              transport_protocol: "TLSv1.3"
    # Test System LIS
    - name: "LIS"
      mode: "STUB_SERVER"
      function: "LIS"
      role: ["OTHER"]
      fqdn: ""
      certificate_file: ""
      certificate_key: ""
      interfaces:
        - name: "IF_LIS_LOG"
          fqdn: ""
          ip: ""
          mask: ""
          gateway: ""            # Leave empty if not required
          dns: [ ]               # Leave empty if not required
          port_mapping:
            - name: "IF_LIS_LOG_HTTP_8443_TLSv1.3"
              protocol: "HTTP"
              port: 8443
              transport_protocol: "TLSv1.3"