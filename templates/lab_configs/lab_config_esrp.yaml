# This configuration file defines the physical and network layout of the test environment.
# It tells the test suite which network entities are involved in the test (e.g. OSP, BCF, ESRP),
# how they are connected to each other, and what network settings and protocols each connection uses.
# The test suite loads this file at startup, validates it, and uses it to automatically launch and
# configure stub server entities before each test run. This file is specific to the functional element
# being tested (e.g. BCF, ESRP) and will need to be filled out to match your actual lab network setup.
lab_config:

  # Path to the Certificate Authority certificate used to validate TLS/mTLS connections between lab entities.
  # Only required if one or more interfaces are configured with mTLSv1.2 or mTLSv1.3 transport. e.g. /path/to/ca.crt
  pca_certificate_file: ""

  # Path to the private key corresponding to the CA certificate above.
  # Only required if one or more interfaces are configured with mTLSv1.2 or mTLSv1.3 transport. e.g. /path/to/ca.key
  pca_certificate_key: ""

  # IP address of the machine running the test suite; must match one of its local network interface IPs. e.g. 192.168.1.10
  test_suite_host_ip: ""

  # Entities represent each network element involved in the test scenario.
  # Each entity is either a real device on the network (REAL_DEVICE) or simulated by the test suite (STUB_SERVER).
  # The test suite launches and manages stub server entities automatically during test execution,
  # while real device entities are expected to already be running on the network.
  entities:

      # OSP (Originating Service Provider) is the carrier-side network element that originates emergency
      # calls. It is simulated as a STUB_SERVER that sends SIP INVITEs toward the BCF, which forwards
      # them onward to the ESRP IUT. Used in tests where the call stimulus must originate from outside
      # the ESInet.
    - name: "OSP"

      # STUB_SERVER = simulated by the test suite; REAL_DEVICE = a real physical device on the network
      mode: "STUB_SERVER"

      # The functional role of this entity; used by the test suite to determine which protocol
      # (SIP or HTTP) to use when communicating with this entity. Valid values: OSP, BCF, ESRP, LIS, LOG, ECRF-LVF, PS, BRIDGE, CHFE, ADR
      function: "OSP"

      # How this entity behaves in tests. Accepts one or more values as a list.
      # SENDER = initiates requests, RECEIVER = listens for incoming requests, IUT = the real device being tested
      role: ["SENDER"]

      # Fully qualified domain name of this entity; used to build request URIs (e.g. sip:host:port or https://host:port).
      # Priority order when building URIs: interface-level FQDN -> entity-level FQDN -> interface IP.
      # Leave empty if the interface-level FQDN or IP should be used instead.
      fqdn: ""

      # Path to this entity's TLS certificate; required for TLS and mTLS connections
      certificate_file: ""

      # Path to the private key for this entity's TLS certificate; required for TLS and mTLS connections
      certificate_key: ""

      # Interfaces define the individual network connections this entity has with other entities in the lab.
      # Each interface maps to a directional link between two entities (e.g. IF_OSP_BCF = OSP connecting to BCF)
      # and specifies the network settings and protocols the test suite will use when sending or receiving traffic on that link.
      # The naming convention IF_<source>_<target> is enforced by the test suite, which splits the interface name
      # to locate the corresponding interface on the target entity (e.g. IF_OSP_BCF -> IF_BCF_OSP).
      interfaces:

          # Network interface connecting OSP to BCF
        - name: "IF_OSP_BCF"

          # FQDN for this specific interface; takes priority over the entity-level FQDN when building URIs
          fqdn: ""

          # IP address the test suite will assign to this machine to represent the OSP side of the OSP-BCF connection (e.g. 192.168.1.10)
          ip: ""

          # Subnet mask for the OSP-BCF interface IP above; used to calculate which subnet this connection belongs to (e.g. 255.255.255.0)
          mask: ""

          # Default gateway for the OSP-BCF Docker network; used when creating the Docker network that connects the OSP and BCF containers. Leave empty if not required
          gateway: ""

          # List of DNS server IP addresses for this interface; must be valid IPv4 or IPv6 addresses. Leave empty if not required
          dns: [ ]

          # Defines the protocol and port combinations this interface uses during tests.
          # Each entry results in the test suite launching a separate stub server instance bound to the specified
          # port and transport protocol on the OSP-BCF connection. The port mapping name is also used by the
          # test suite to match this interface against the relevant variation in the test config, so only the
          # port mappings required for the tests being run need to be active.
          port_mapping:

              # Naming convention: IF_<source>_<target>_<protocol>_<port>_<transport>;
              # this name is matched against the test variation config to determine which stub server to launch for a given test
            - name: "IF_OSP_BCF_SIP_5060_TCP"

              # Application protocol; valid values: SIP, HTTP, HTTPS, DNS, TCP, UDP, ICMP, ARP
              protocol: "SIP"

              # Port number (0-65535)
              port: 5060

              # Transport protocol; valid values: TCP, UDP, SCTP, TLSv1.2, TLSv1.3, mTLSv1.2, mTLSv1.3
              transport_protocol: "TCP"

      # BCF (Border Control Function) is the ESInet entry-point that accepts SIP calls from the OSP
      # and forwards them to the ESRP IUT. It is simulated as a STUB_SERVER.
      # Role ["OTHER", "SENDER"]: BCF acts as an intermediate relay in most tests (OTHER), but also
      # initiates SIP calls directly toward the ESRP in tests that require BCF-originated stimulus
    - name: "BCF"

      # STUB_SERVER = simulated by the test suite; REAL_DEVICE = a real physical device on the network
      mode: "STUB_SERVER"

      # The functional role of this entity; used by the test suite to determine which protocol
      # (SIP or HTTP) to use when communicating with this entity. Valid values: OSP, BCF, ESRP, LIS, LOG, ECRF-LVF, PS, BRIDGE, CHFE, ADR
      function: "BCF"

      # How this entity behaves in tests. Accepts one or more values as a list.
      # OTHER = intermediate relay that forwards traffic but does not initiate; SENDER = actively originates SIP requests
      role: ["OTHER", "SENDER", "RECEIVER"]

      # Fully qualified domain name of this entity; used to build request URIs (e.g. sip:host:port or https://host:port).
      # Priority order when building URIs: interface-level FQDN -> entity-level FQDN -> interface IP.
      # Leave empty if the interface-level FQDN or IP should be used instead.
      fqdn: ""

      # Path to this entity's TLS certificate; required for TLS and mTLS connections
      certificate_file: ""

      # Path to the private key for this entity's TLS certificate; required for TLS and mTLS connections
      certificate_key: ""

      # Interfaces define the individual network connections this entity has with other entities in the lab.
      # Each interface maps to a directional link between two entities (e.g. IF_BCF_OSP = BCF connecting to OSP)
      # and specifies the network settings and protocols the test suite will use when sending or receiving traffic on that link.
      # The naming convention IF_<source>_<target> is enforced by the test suite, which splits the interface name
      # to locate the corresponding interface on the target entity (e.g. IF_BCF_OSP -> IF_OSP_BCF).
      interfaces:

          # Network interface connecting BCF to OSP (inbound side — receives calls from OSP)
        - name: "IF_BCF_OSP"

          # FQDN for this specific interface; takes priority over the entity-level FQDN when building URIs
          fqdn: ""

          # IP address the test suite will assign to this machine to represent the BCF side of the BCF-OSP connection (e.g. 192.168.1.10)
          ip: ""

          # Subnet mask for the BCF-OSP interface IP above; used to calculate which subnet this connection belongs to (e.g. 255.255.255.0)
          mask: ""

          # Default gateway for the BCF-OSP Docker network; used when creating the Docker network that connects the BCF and OSP containers. Leave empty if not required
          gateway: ""

          # List of DNS server IP addresses for this interface; must be valid IPv4 or IPv6 addresses. Leave empty if not required
          dns: [ ]

          # Defines the protocol and port combinations this interface uses during tests.
          # Each entry results in the test suite launching a separate stub server instance bound to the specified
          # port and transport protocol on the BCF-OSP connection. The port mapping name is also used by the
          # test suite to match this interface against the relevant variation in the test config, so only the
          # port mappings required for the tests being run need to be active.
          port_mapping:

              # Naming convention: IF_<source>_<target>_<protocol>_<port>_<transport>;
              # this name is matched against the test variation config to determine which stub server to launch for a given test
            - name: "IF_BCF_OSP_SIP_5060_TC"

              # Application protocol; valid values: SIP, HTTP, HTTPS, DNS, TCP, UDP, ICMP, ARP
              protocol: "SIP"

              # Port number (0-65535)
              port: 5060

              # Transport protocol; valid values: TCP, UDP, SCTP, TLSv1.2, TLSv1.3, mTLSv1.2, mTLSv1.3
              transport_protocol: "TCP"

          # Network interface connecting BCF to ESRP (outbound side — sends calls into the ESInet toward the ESRP IUT)
        - name: "IF_BCF_ESRP"

          # FQDN for this specific interface; takes priority over the entity-level FQDN when building URIs
          fqdn: ""

          # IP address the test suite will assign to this machine to represent the BCF side of the BCF-ESRP connection (e.g. 192.168.1.10)
          ip: ""

          # Subnet mask for the BCF-ESRP interface IP above; used to calculate which subnet this connection belongs to (e.g. 255.255.255.0)
          mask: ""

          # Default gateway for the BCF-ESRP Docker network; used when creating the Docker network that connects the BCF and ESRP containers. Leave empty if not required
          gateway: ""

          # List of DNS server IP addresses for this interface; must be valid IPv4 or IPv6 addresses. Leave empty if not required
          dns: [ ]

          # Defines the protocol and port combinations this interface uses during tests.
          # Each entry results in the test suite launching a separate stub server instance bound to the specified
          # port and transport protocol on the BCF-ESRP connection. The port mapping name is also used by the
          # test suite to match this interface against the relevant variation in the test config, so only the
          # port mappings required for the tests being run need to be active.
          port_mapping:

              # Naming convention: IF_<source>_<target>_<protocol>_<port>_<transport>;
              # this name is matched against the test variation config to determine which stub server to launch for a given test
            - name: "IF_BCF_ESRP_SIP_5060_TCP"

              # Application protocol; valid values: SIP, HTTP, HTTPS, DNS, TCP, UDP, ICMP, ARP
              protocol: "SIP"

              # Port number (0-65535)
              port: 5060

              # Transport protocol; valid values: TCP, UDP, SCTP, TLSv1.2, TLSv1.3, mTLSv1.2, mTLSv1.3
              transport_protocol: "TCP"

      # ESRP (Emergency Services Routing Proxy) is the device under test in this lab configuration.
      # It receives SIP INVITEs from the BCF, dereferences caller location via the LIS, resolves the
      # location to a PSAP service URI via the ECRF-LVF, and forwards the call to the CHFE. It also
      # retrieves policy from the PS, fetches Additional Data from the ADR, queries the SAL when
      # constructing a Discrepancy Report, and sends all log events to the LOG service.
    - name: "ESRP"

      # STUB_SERVER = simulated by the test suite; REAL_DEVICE = a real physical device on the network
      mode: "REAL_DEVICE"

      # The functional role of this entity; used by the test suite to determine which protocol
      # (SIP or HTTP) to use when communicating with this entity. Valid values: OSP, BCF, ESRP, LIS, LOG, ECRF-LVF, PS, BRIDGE, CHFE, ADR
      function: "ESRP"

      # How this entity behaves in tests. Accepts one or more values as a list.
      # SENDER = initiates requests, RECEIVER = listens for incoming requests, IUT = the real device being tested
      role: ["IUT"]

      # Fully qualified domain name of this entity; used to build request URIs (e.g. sip:host:port or https://host:port).
      # Priority order when building URIs: interface-level FQDN -> entity-level FQDN -> interface IP.
      # Leave empty if the interface-level FQDN or IP should be used instead.
      fqdn: ""

      # Path to this entity's TLS certificate; required for TLS and mTLS connections
      certificate_file: ""

      # Path to the private key for this entity's TLS certificate; required for TLS and mTLS connections
      certificate_key: ""

      # Interfaces define the individual network connections this entity has with other entities in the lab.
      # Each interface maps to a directional link between two entities (e.g. IF_ESRP_BCF = ESRP connecting to BCF)
      # and specifies the network settings and protocols the test suite will use when sending or receiving traffic on that link.
      # The naming convention IF_<source>_<target> is enforced by the test suite, which splits the interface name
      # to locate the corresponding interface on the target entity (e.g. IF_ESRP_BCF -> IF_BCF_ESRP).
      interfaces:

          # Network interface on which the ESRP receives SIP INVITEs forwarded by the BCF from the OSP
        - name: "IF_ESRP_BCF"

          # FQDN for this specific interface; takes priority over the entity-level FQDN when building URIs
          fqdn: ""

          # IP address the test suite will assign to this machine to represent the ESRP side of the ESRP-BCF connection (e.g. 192.168.1.10)
          ip: ""

          # Subnet mask for the ESRP-BCF interface IP above; used to calculate which subnet this connection belongs to (e.g. 255.255.255.0)
          mask: ""

          # Default gateway for the ESRP-BCF Docker network; used when creating the Docker network that connects the ESRP and BCF containers. Leave empty if not required
          gateway: ""

          # List of DNS server IP addresses for this interface; must be valid IPv4 or IPv6 addresses. Leave empty if not required
          dns: [ ]

          # Defines the protocol and port combinations this interface uses during tests.
          # Each entry results in the test suite launching a separate stub server instance bound to the specified
          # port and transport protocol on the ESRP-BCF connection. The port mapping name is also used by the
          # test suite to match this interface against the relevant variation in the test config, so only the
          # port mappings required for the tests being run need to be active.
          port_mapping:

              # Naming convention: IF_<source>_<target>_<protocol>_<port>_<transport>;
              # this name is matched against the test variation config to determine which stub server to launch for a given test
            - name: "IF_ESRP_BCF_SIP_5060_TCP"

              # Application protocol; valid values: SIP, HTTP, HTTPS, DNS, TCP, UDP, ICMP, ARP
              protocol: "SIP"

              # Port number (0-65535)
              port: 5060

              # Transport protocol; valid values: TCP, UDP, SCTP, TLSv1.2, TLSv1.3, mTLSv1.2, mTLSv1.3
              transport_protocol: "TCP"

          # Network interface used by the ESRP to send HELD dereference requests to the LIS to resolve
          # location reference URIs embedded in SIP INVITE Geolocation headers into PIDF-LO objects,
          # and to receive SIP NOTIFY messages when location-by-reference subscriptions are used.
        - name: "IF_ESRP_LIS"

          # FQDN for this specific interface; takes priority over the entity-level FQDN when building URIs
          fqdn: ""

          # IP address the test suite will assign to this machine to represent the ESRP side of the ESRP-LIS connection (e.g. 192.168.1.10)
          ip: ""

          # Subnet mask for the ESRP-LIS interface IP above; used to calculate which subnet this connection belongs to (e.g. 255.255.255.0)
          mask: ""

          # Default gateway for the ESRP-LIS Docker network; used when creating the Docker network that connects the ESRP and LIS containers. Leave empty if not required
          gateway: ""

          # List of DNS server IP addresses for this interface; must be valid IPv4 or IPv6 addresses. Leave empty if not required
          dns: [ ]

          # Defines the protocol and port combinations this interface uses during tests.
          # Each entry results in the test suite launching a separate stub server instance bound to the specified
          # port and transport protocol on the ESRP-LIS connection. The port mapping name is also used by the
          # test suite to match this interface against the relevant variation in the test config, so only the
          # port mappings required for the tests being run need to be active.
          port_mapping:

              # HTTP port used by the ESRP to send HELD POST location dereference requests to the LIS
            - name: "IF_ESRP_LIS_HTTP_8080_TCP"

              # Application protocol; valid values: SIP, HTTP, HTTPS, DNS, TCP, UDP, ICMP, ARP
              protocol: "HTTP"

              # Port number (0-65535)
              port: 8080

              # Transport protocol; valid values: TCP, UDP, SCTP, TLSv1.2, TLSv1.3, mTLSv1.2, mTLSv1.3
              transport_protocol: "TCP"

              # SIP port used when the ESRP subscribes to location-by-reference events and receives
              # SIP NOTIFY from the LIS with updated PIDF-LO
            - name: "IF_ESRP_LIS_SIP_5060_TCP"

              # Application protocol; valid values: SIP, HTTP, HTTPS, DNS, TCP, UDP, ICMP, ARP
              protocol: "SIP"

              # Port number (0-65535)
              port: 5060

              # Transport protocol; valid values: TCP, UDP, SCTP, TLSv1.2, TLSv1.3, mTLSv1.2, mTLSv1.3
              transport_protocol: "TCP"

          # Network interface used by the ESRP to send HTTP LoST findService requests to the ECRF-LVF
          # stub, resolving the caller's location to a PSAP queue URI for call routing.
        - name: "IF_ESRP_ECRF-LVF"

          # FQDN for this specific interface; takes priority over the entity-level FQDN when building URIs
          fqdn: ""

          # IP address the test suite will assign to this machine to represent the ESRP side of the ESRP-ECRF-LVF connection (e.g. 192.168.1.10)
          ip: ""

          # Subnet mask for the ESRP-ECRF-LVF interface IP above; used to calculate which subnet this connection belongs to (e.g. 255.255.255.0)
          mask: ""

          # Default gateway for the ESRP-ECRF-LVF Docker network; used when creating the Docker network that connects the ESRP and ECRF-LVF containers. Leave empty if not required
          gateway: ""

          # List of DNS server IP addresses for this interface; must be valid IPv4 or IPv6 addresses. Leave empty if not required
          dns: [ ]

          # Defines the protocol and port combinations this interface uses during tests.
          # Each entry results in the test suite launching a separate stub server instance bound to the specified
          # port and transport protocol on the ESRP-ECRF-LVF connection. The port mapping name is also used by the
          # test suite to match this interface against the relevant variation in the test config, so only the
          # port mappings required for the tests being run need to be active.
          port_mapping:

              # Naming convention: IF_<source>_<target>_<protocol>_<port>_<transport>;
              # this name is matched against the test variation config to determine which stub server to launch for a given test
            - name: "IF_ESRP_ECRF-LVF_HTTP_8080_TCP"

              # Application protocol; valid values: SIP, HTTP, HTTPS, DNS, TCP, UDP, ICMP, ARP
              protocol: "HTTP"

              # Port number (0-65535)
              port: 8080

              # Transport protocol; valid values: TCP, UDP, SCTP, TLSv1.2, TLSv1.3, mTLSv1.2, mTLSv1.3
              transport_protocol: "TCP"

          # Network interface used by the ESRP to forward the routed SIP INVITE to the CHFE after location
          # resolution. In TD_ESRP_008.md (Additional Data retrieval), this interface is used in monitor
          # mode to verify that ADR reference URIs in the outgoing SIP INVITE remain unchanged.
        - name: "IF_ESRP_CHFE"

          # FQDN for this specific interface; takes priority over the entity-level FQDN when building URIs
          fqdn: ""

          # IP address the test suite will assign to this machine to represent the ESRP side of the ESRP-CHFE connection (e.g. 192.168.1.10)
          ip: ""

          # Subnet mask for the ESRP-CHFE interface IP above; used to calculate which subnet this connection belongs to (e.g. 255.255.255.0)
          mask: ""

          # Default gateway for the ESRP-CHFE Docker network; used when creating the Docker network that connects the ESRP and CHFE containers. Leave empty if not required
          gateway: ""

          # List of DNS server IP addresses for this interface; must be valid IPv4 or IPv6 addresses. Leave empty if not required
          dns: [ ]

          # Defines the protocol and port combinations this interface uses during tests.
          # Each entry results in the test suite launching a separate stub server instance bound to the specified
          # port and transport protocol on the ESRP-CHFE connection. The port mapping name is also used by the
          # test suite to match this interface against the relevant variation in the test config, so only the
          # port mappings required for the tests being run need to be active.
          port_mapping:

              # Naming convention: IF_<source>_<target>_<protocol>_<port>_<transport>;
              # this name is matched against the test variation config to determine which stub server to launch for a given test
            - name: "IF_ESRP_CHFE_SIP_5060_TCP"

              # Application protocol; valid values: SIP, HTTP, HTTPS, DNS, TCP, UDP, ICMP, ARP
              protocol: "SIP"

              # Port number (0-65535)
              port: 5060

              # Transport protocol; valid values: TCP, UDP, SCTP, TLSv1.2, TLSv1.3, mTLSv1.2, mTLSv1.3
              transport_protocol: "TCP"

          # Network interface used by the ESRP to query the SAL (Service/Agency Locator) when constructing
          # a Discrepancy Report.
        - name: "IF_ESRP_SAL"

          # FQDN for this specific interface; takes priority over the entity-level FQDN when building URIs
          fqdn: ""

          # IP address the test suite will assign to this machine to represent the ESRP side of the ESRP-SAL connection (e.g. 192.168.1.10)
          ip: ""

          # Subnet mask for the ESRP-SAL interface IP above; used to calculate which subnet this connection belongs to (e.g. 255.255.255.0)
          mask: ""

          # Default gateway for the ESRP-SAL Docker network; used when creating the Docker network that connects the ESRP and SAL containers. Leave empty if not required
          gateway: ""

          # List of DNS server IP addresses for this interface; must be valid IPv4 or IPv6 addresses. Leave empty if not required
          dns: [ ]

          # Defines the protocol and port combinations this interface uses during tests.
          # Each entry results in the test suite launching a separate stub server instance bound to the specified
          # port and transport protocol on the ESRP-SAL connection. The port mapping name is also used by the
          # test suite to match this interface against the relevant variation in the test config, so only the
          # port mappings required for the tests being run need to be active.
          port_mapping:

              # Naming convention: IF_<source>_<target>_<protocol>_<port>_<transport>;
              # this name is matched against the test variation config to determine which stub server to launch for a given test
            - name: "IF_ESRP_SAL_HTTP_8080_TCP"

              # Application protocol; valid values: SIP, HTTP, HTTPS, DNS, TCP, UDP, ICMP, ARP
              protocol: "HTTP"

              # Port number (0-65535)
              port: 8080

              # Transport protocol; valid values: TCP, UDP, SCTP, TLSv1.2, TLSv1.3, mTLSv1.2, mTLSv1.3
              transport_protocol: "TCP"

          # Network interface used by the ESRP to send the Discrepancy Report to the DR server. When the
          # ESRP detects an invalid incoming SIP message, it queries SAL for the DR server URI, then HTTP
          # POSTs a JSON discrepancy report to the DR server.
        - name: "IF_ESRP_DR"

          # FQDN for this specific interface; takes priority over the entity-level FQDN when building URIs
          fqdn: ""

          # IP address the test suite will assign to this machine to represent the ESRP side of the ESRP-DR connection (e.g. 192.168.1.10)
          ip: ""

          # Subnet mask for the ESRP-DR interface IP above; used to calculate which subnet this connection belongs to (e.g. 255.255.255.0)
          mask: ""

          # Default gateway for the ESRP-DR Docker network; used when creating the Docker network that connects the ESRP and DR containers. Leave empty if not required
          gateway: ""

          # List of DNS server IP addresses for this interface; must be valid IPv4 or IPv6 addresses. Leave empty if not required
          dns: [ ]

          # Defines the protocol and port combinations this interface uses during tests.
          # Each entry results in the test suite launching a separate stub server instance bound to the specified
          # port and transport protocol on the ESRP-DR connection. The port mapping name is also used by the
          # test suite to match this interface against the relevant variation in the test config, so only the
          # port mappings required for the tests being run need to be active.
          port_mapping:

              # Naming convention: IF_<source>_<target>_<protocol>_<port>_<transport>;
              # this name is matched against the test variation config to determine which stub server to launch for a given test
            - name: "IF_ESRP_DR_HTTP_8080_TCP"

              # Application protocol; valid values: SIP, HTTP, HTTPS, DNS, TCP, UDP, ICMP, ARP
              protocol: "HTTP"

              # Port number (0-65535)
              port: 8080

              # Transport protocol; valid values: TCP, UDP, SCTP, TLSv1.2, TLSv1.3, mTLSv1.2, mTLSv1.3
              transport_protocol: "TCP"

          # Network interface used by the ESRP to retrieve policy objects from the PS (Policy Store).
          # The ESRP sends an HTTP GET to the PS to fetch a JWS-signed policy object containing Additional
          # Data conditions that govern how calls should be processed.
        - name: "IF_ESRP_PS"

          # FQDN for this specific interface; takes priority over the entity-level FQDN when building URIs
          fqdn: ""

          # IP address the test suite will assign to this machine to represent the ESRP side of the ESRP-PS connection (e.g. 192.168.1.10)
          ip: ""

          # Subnet mask for the ESRP-PS interface IP above; used to calculate which subnet this connection belongs to (e.g. 255.255.255.0)
          mask: ""

          # Default gateway for the ESRP-PS Docker network; used when creating the Docker network that connects the ESRP and PS containers. Leave empty if not required
          gateway: ""

          # List of DNS server IP addresses for this interface; must be valid IPv4 or IPv6 addresses. Leave empty if not required
          dns: [ ]

          # Defines the protocol and port combinations this interface uses during tests.
          # Each entry results in the test suite launching a separate stub server instance bound to the specified
          # port and transport protocol on the ESRP-PS connection. The port mapping name is also used by the
          # test suite to match this interface against the relevant variation in the test config, so only the
          # port mappings required for the tests being run need to be active.
          port_mapping:

              # Naming convention: IF_<source>_<target>_<protocol>_<port>_<transport>;
              # this name is matched against the test variation config to determine which stub server to launch for a given test
            - name: "IF_ESRP_PS_HTTP_8080_TCP"

              # Application protocol; valid values: SIP, HTTP, HTTPS, DNS, TCP, UDP, ICMP, ARP
              protocol: "HTTP"

              # Port number (0-65535)
              port: 8080

              # Transport protocol; valid values: TCP, UDP, SCTP, TLSv1.2, TLSv1.3, mTLSv1.2, mTLSv1.3
              transport_protocol: "TCP"

          # Network interface used by the ESRP to fetch Additional Data from the ADR (Additional Data
          # Repository). The ESRP sends an HTTP GET using the reference URI extracted from the Call-Info
          # header or PIDF-LO body of the incoming SIP INVITE.
        - name: "IF_ESRP_ADR"

          # FQDN for this specific interface; takes priority over the entity-level FQDN when building URIs
          fqdn: ""

