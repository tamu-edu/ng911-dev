openssl_conf = openssl_init

[openssl_init]
ssl_conf = ssl_sect

[ssl_sect]
system_default = system_default_sect

[system_default_sect]
MinProtocol    = TLSv1.2
MaxProtocol    = TLSv1.3
CipherString   = ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:!aNULL:!eNULL:!EXPORT:!DES:!3DES:!MD5:!RC4:!SHA1
Ciphersuites   = TLS_AES_128_GCM_SHA256:TLS_CHACHA20_POLY1305_SHA256