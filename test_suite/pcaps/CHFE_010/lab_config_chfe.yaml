lab_config:
  pca_certificate_file: ""  # TLS certificate file for secure connections
  pca_certificate_key: ""   # TLS private key matching the certificate
  test_suite_host_ip: "10.140.140.253"    # IP of the machine running the test suite
  entities:
    # Test System ESRP
    - name: "ESRP"
      mode: "STUB_SERVER"
      function: "ESRP"
      role: ["OTHER"]
      fqdn: ""
      certificate_file: ""
      certificate_key: ""
      api: # All values listed to be added manually
        conference_id: "test_conference_id"
      interfaces:
        - name: "IF_ESRP_CHFE"
          fqdn: ""
          ip: "192.168.1.50"            # Interface IP address
          mask: "255.255.255.0"          # Network mask
          gateway: ""  #  Leave empty if not required
          dns: [ ]  #  Leave empty if not required
          port_mapping:
            - name: "IF_ESRP_CHFE_SIP_5060_TCP"
              protocol: "SIP"
              port: 5060
              transport_protocol: "TCP"
    # Test System Conference App
    - name: "TS-CA"             # Location Information Server (can receive HELD or SIP SUBSCRIBE)
      mode: "STUB_SERVER"
      function: "CHFE"
      role: ["RECEIVER"]
      fqdn: ""
      certificate_file: ""
      certificate_key: ""
      api:
        conference_id: ""
      interfaces:
        - name: "IF_TS-CA_CHFE"
          fqdn: ""
          ip: "10.20.30.40"            # Interface IP address
          mask: "255.255.255.0"          # Network mask
          gateway: ""         # Leave empty if not required
          dns: [ ]            # Leave empty if not required
          port_mapping:
            - name: "IF_TS-CA_CHFE_SIP_5060_TCP"
              protocol: "SIP"
              port: 5060
              transport_protocol: "TCP"
    # Test System CHFE
    - name: "CHFE"
      mode: "STUB_SERVER"
      function: "CHFE"
      role: [ "RECEIVER" ]
      fqdn: ""
      certificate_file: ""
      certificate_key: "test_suite/PCA_key.pem"
      api:
        tel_number: ""
      interfaces:
        - name: "IF_CHFE_ESRP"
          fqdn: ""
          ip: "172.16.0.100"             # Interface IP address
          mask: "255.255.255.0"          # Network mask
          gateway: ""         # Leave empty if not required
          dns: [ ]            # Leave empty if not required
          port_mapping:
            - name: "IF_CHFE_ESRP_SIP_5060_TCP"
              protocol: "SIP"
              port: 5060
              transport_protocol: "TCP"
        - name: "IF_CHFE_TS-CA"
          fqdn: ""
          ip: "172.16.0.100"             # Interface IP address
          mask: "255.255.255.0"          # Network mask
          gateway: ""         # Leave empty if not required
          dns: [ ]            # Leave empty if not required
          port_mapping:
            - name: "IF_CHFE_TS-CA_SIP_5060_TCP"
              protocol: "SIP"
              port: 5060
              transport_protocol: "TCP"
        - name: "IF_CHFE_LOG"
          fqdn: ""
          ip: "172.16.0.100"
          mask: "255.255.255.0"
          gateway: ""  #  Leave empty if not required
          dns: [ ]  #  Leave empty if not required
          port_mapping:
            - name: "IF_CHFE_LOG_HTTP_8080_TCP"
              protocol: "HTTP"
              port: 8080
              transport_protocol: "TCP"
    # Test System LOG
    - name: "LOG"             # Simulated log service
      mode: "STUB_SERVER"     # Acts as a stub server for HTTP requests
      function: "LOG"
      role: ["RECEIVER"]          # Sends HTTP messages
      fqdn: ""
      certificate_file: ""
      certificate_key: ""
      interfaces:
        - name: "IF_LOG_CHFE"   # Interface between LOG and BCF
          fqdn: ""
          ip: "10.10.0.111"            # Interface IP address
          mask: "255.255.255.0"          # Network mask
          gateway: ""         # Leave empty if not required
          dns: [ ]            # Leave empty if not required
          port_mapping:
            - name: "IF_LOG_CHFE_HTTP_8080_TCP"
              protocol: "HTTP"
              port: 8080
              transport_protocol: "TCP"