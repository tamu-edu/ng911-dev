name: PR Code Quality Gate

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------
      # Checkout
      # --------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # --------------------------------------
      # Setup Python
      # --------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # --------------------------------------
      # Install tools
      # --------------------------------------
      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy black jq types-requests types-PyYAML types-python-dateutil

      # --------------------------------------
      # Ruff
      # --------------------------------------
      - name: Run Ruff
        run: |
          ruff check . --output-format=json > ruff_report.json || true
          ruff check . --output-format=github || true

      # --------------------------------------
      # Black
      # --------------------------------------
      - name: Black formatting check
        run: |
          black --check --diff . > black_report.txt 2>&1 || true

      # --------------------------------------
      # Mypy
      # --------------------------------------
      - name: Mypy type check
        run: |
          PYTHONPATH=test_suite mypy test_suite \
            --explicit-package-bases \
            --ignore-missing-imports \
            --show-error-codes \
            --pretty \
            --no-error-summary > mypy_report.txt 2>&1 || true

      # --------------------------------------
      # Calculate totals
      # --------------------------------------
      - name: Calculate issue totals
        id: totals
        run: |
          RUFF_TOTAL=$(jq length ruff_report.json 2>/dev/null || echo 0)

          if grep -q "would reformat" black_report.txt; then
            BLACK_TOTAL=$(grep -c "would reformat" black_report.txt)
          else
            BLACK_TOTAL=0
          fi

          if grep -q "error:" mypy_report.txt; then
            MYPY_TOTAL=$(grep -c "^[^:]*:[0-9]*: error:" mypy_report.txt || echo 0)
          else
            MYPY_TOTAL=0
          fi

          TOTAL=$((RUFF_TOTAL + BLACK_TOTAL + MYPY_TOTAL))

          echo "ruff=$RUFF_TOTAL" >> $GITHUB_OUTPUT
          echo "black=$BLACK_TOTAL" >> $GITHUB_OUTPUT
          echo "mypy=$MYPY_TOTAL" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

      # --------------------------------------
      # Upload Reports
      # --------------------------------------
      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-quality-reports
          path: |
            ruff_report.json
            mypy_report.txt
            black_report.txt

      # --------------------------------------
      # Comment PR (ALWAYS)
      # --------------------------------------
      - name: Comment quality summary (only on failure)
        if: ${{ github.event_name == 'pull_request' && always() }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const marker = "<!-- CODE_QUALITY_COMMENT -->";

            const ruffTotal = Number("${{ steps.totals.outputs.ruff }}");
            const blackTotal = Number("${{ steps.totals.outputs.black }}");
            const mypyTotal = Number("${{ steps.totals.outputs.mypy }}");
            const total = Number("${{ steps.totals.outputs.total }}");

            // -----------------------------
            // Delete previous comment
            // -----------------------------
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            for (const comment of comments) {
              if (comment.body && comment.body.includes(marker)) {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: comment.id
                });
              }
            }

            // 👉 If no issues — do nothing
            if (total === 0) {
              console.log("No issues — skipping comment");
              return;
            }

            // -----------------------------
            // Build comment
            // -----------------------------
            let body = "## ❌ Code Quality Check Failed\n\n";
            body += `**Total issues detected:** ${total}\n\n`;

            body += `- Ruff: ${ruffTotal}\n`;
            body += `- Black: ${blackTotal}\n`;
            body += `- Mypy: ${mypyTotal}\n\n`;

            body += `📎 Full reports available in workflow artifacts:\n${runUrl}\n\n`;
            body += marker;

            // -----------------------------
            // Create new comment
            // -----------------------------
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body
            });

      # --------------------------------------
      # Final Gate (FAIL ONLY HERE)
      # --------------------------------------
      - name: Fail if issues exist
        run: |
          if [ "${{ steps.totals.outputs.total }}" -ne 0 ]; then
            echo "Code quality gate failed."
            exit 1
          else
            echo "Code quality gate passed."
          fi