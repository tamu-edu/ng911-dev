name: Dependency Security Scan

on:
  workflow_call:
  # workflow_dispatch:
  # pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  security_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Install Syft (SBOM generator)
      # -----------------------------
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft version

      - name: Generate SBOM (CycloneDX 1.5)
        run: |
          SYFT_FORMAT_JSON_PRETTY=true \
          syft . -o cyclonedx-json@1.5=sbom.cdx.json
          ls -la sbom.cdx.json

      # -----------------------------
      # Install Trivy
      # -----------------------------
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          trivy --version

      - name: Trivy Scan (filesystem)
        run: |
          trivy fs --format json -o trivy.json .

      # -----------------------------
      # Install Grype
      # -----------------------------
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype version

      - name: Grype Scan (SBOM)
        run: |
          grype sbom:sbom.cdx.json -o json > grype.json

      # -----------------------------
      # Install OSV-Scanner
      # -----------------------------
      - name: Install OSV-Scanner
        run: |
          OSV_VERSION="v1.7.3"
          curl -L https://github.com/google/osv-scanner/releases/download/${OSV_VERSION}/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner
          sudo mv osv-scanner /usr/local/bin/
          osv-scanner --version
          
      - name: OSV Scan
        run: |
          osv-scanner scan \
            --lockfile test_suite/requirements.txt \
            --format json \
            --output osv.json || true

      # -----------------------------
      # Install Bomber
      # -----------------------------
      - name: Install Bomber
        run: |
          go install github.com/devops-kung-fu/bomber@latest
          sudo mv ~/go/bin/bomber /usr/local/bin/
          bomber --version

      - name: Bomber Scan (SBOM)
        run: |
          bomber scan sbom.cdx.json --output json > bomber.json || true

      - name: Merge vulnerability results
        id: merge_step
        run: |
          python << 'PY'
          import json
      
          def load(path):
              try:
                  with open(path) as f:
                      return json.load(f)
              except:
                  return {}
      
          def norm_sev(s):
              if not s: return "UNKNOWN"
              s = s.upper()
              if s in ("CRIT",): return "CRITICAL"
              if s in ("MODERATE",): return "MEDIUM"
              return s
      
          SEV_WEIGHT = {"UNKNOWN":0,"LOW":1,"MEDIUM":2,"HIGH":3,"CRITICAL":4}
      
          merged = {}
      
          # ---- TRIVY ----
          trivy = load("trivy.json")
          for res in trivy.get("Results", []):
              for v in res.get("Vulnerabilities", []):
                  key = (v.get("VulnerabilityID"), v.get("PkgName"), v.get("InstalledVersion"))
                  merged.setdefault(key, {"sources":set(), "severity":norm_sev(v.get("Severity"))})
                  merged[key]["sources"].add("trivy")
      
          # ---- GRYPE ----
          grype = load("grype.json")
          for m in grype.get("matches", []):
              vuln = m.get("vulnerability", {})
              art = m.get("artifact", {})
              key = (vuln.get("id"), art.get("name"), art.get("version"))
              merged.setdefault(key, {"sources":set(), "severity":norm_sev(vuln.get("severity"))})
              merged[key]["sources"].add("grype")
      
          # ---- OSV ----
          osv = load("osv.json")
          for r in osv.get("results", []):
              for v in r.get("vulnerabilities", []):
                  key = (v.get("id"), None, None)
                  merged.setdefault(key, {"sources":set(), "severity":"UNKNOWN"})
                  merged[key]["sources"].add("osv")
      
          # ---- BOMBER ----
          bomber = load("bomber.json")
          vulns = bomber.get("vulnerabilities") or bomber.get("results") or []
          for v in vulns:
              key = (v.get("id"), v.get("package"), v.get("version"))
              merged.setdefault(key, {"sources":set(), "severity":norm_sev(v.get("severity"))})
              merged[key]["sources"].add("bomber")
      
          final = []
          for (vid,pkg,ver),data in merged.items():
              sev = data["severity"]
              sources = list(data["sources"])
              score = SEV_WEIGHT.get(sev,0)*25 + (len(sources)-1)*10
              final.append({
                  "id": vid,
                  "package": pkg,
                  "version": ver,
                  "severity": sev,
                  "sources": sources,
                  "score": score
              })
      
          with open("merged-vulns.json","w") as f:
              json.dump(final,f,indent=2)
      
          # Count HIGH/CRITICAL
          critical = [v for v in final if v["severity"] in ["CRITICAL", "HIGH"]]
      
          if critical:
              print("Found HIGH or CRITICAL vulnerabilities.")
              with open("fail_flag.txt", "w") as f:
                  f.write("fail")
          else:
              print("No HIGH or CRITICAL vulnerabilities.")
          PY

      # -----------------------------
      # Upload Reports
      # -----------------------------
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability_report
          path: |
            sbom.cdx.json
            trivy.json
            grype.json
            osv.json
            bomber.json
            merged-vulns.json

      - name: Comment PR with security summary (only on failure)
        if: ${{ github.event_name == 'pull_request' && always() }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const marker = "<!-- SECURITY_SCAN_COMMENT -->";

            // Detect failure
            const failed = fs.existsSync("fail_flag.txt");

            // 👉 If no failure — remove old comment and exit
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            for (const comment of comments) {
              if (comment.body && comment.body.includes(marker)) {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: comment.id
                });
              }
            }

            if (!failed) {
              console.log("No HIGH/CRITICAL vulnerabilities — skipping comment");
              return;
            }

            // -----------------------------
            // Load merged report
            // -----------------------------
            let items = [];
            try {
              if (fs.existsSync("merged-vulns.json")) {
                const raw = fs.readFileSync("merged-vulns.json", "utf8") || "[]";
                items = JSON.parse(raw);
                if (!Array.isArray(items)) items = [];
              }
            } catch (e) {
              items = [];
            }

            // Count severities
            const counts = { CRITICAL: 0, HIGH: 0, MEDIUM: 0, LOW: 0, UNKNOWN: 0 };
            for (const v of items) {
              const sev = String(v?.severity || "UNKNOWN").toUpperCase();
              if (counts[sev] === undefined) counts.UNKNOWN += 1;
              else counts[sev] += 1;
            }

            const total = Object.values(counts).reduce((a, b) => a + b, 0);

            // -----------------------------
            // Build comment
            // -----------------------------
            let body = "## ❌ Dependency Security Scan Failed\n\n";
            body += `**Total findings:** ${total}\n\n`;

            body += `- CRITICAL: ${counts.CRITICAL}\n`;
            body += `- HIGH: ${counts.HIGH}\n`;
            body += `- MEDIUM: ${counts.MEDIUM}\n`;
            body += `- LOW: ${counts.LOW}\n`;
            body += `- UNKNOWN: ${counts.UNKNOWN}\n\n`;

            body += "Pipeline failed due to **HIGH or CRITICAL vulnerabilities**.\n\n";

            body += `📎 Full reports available in workflow artifacts:\n${runUrl}\n\n`;
            body += marker;

            // -----------------------------
            // Create new comment
            // -----------------------------
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body
            });

      - name: Fail pipeline if vulnerabilities detected
        run: |
          if [ -f fail_flag.txt ]; then
            echo "Pipeline failed due to HIGH or CRITICAL vulnerabilities."
            exit 1
          else
            echo "Security check passed."
          fi
      
